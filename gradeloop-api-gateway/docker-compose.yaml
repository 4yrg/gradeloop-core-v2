# =============================================================================
# GradeLoop API Gateway - Docker Compose
# Kong API Gateway with PostgreSQL and Dashboard
# =============================================================================

services:
  # =============================================================================
  # Kong Database (PostgreSQL)
  # =============================================================================
  kong-database:
    image: postgres:16-alpine
    container_name: gradeloop-kong-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=kong
      - POSTGRES_PASSWORD=${KONG_DB_PASSWORD:-kong_pass}
      - POSTGRES_DB=kong
    ports:
      - "5433:5432"
    volumes:
      - kong-database-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d kong"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # Kong Migrations (One-time)
  # =============================================================================
  kong-migrations:
    image: kong:3.4-alpine
    container_name: gradeloop-kong-migrations
    restart: "no"
    command: kong migrations bootstrap
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=kong-database
      - KONG_PG_PORT=5432
      - KONG_PG_USER=kong
      - KONG_PG_PASSWORD=${KONG_DB_PASSWORD:-kong_pass}
      - KONG_PG_DB=kong
    depends_on:
      kong-database:
        condition: service_healthy
    networks:
      - gradeloop-network

  # =============================================================================
  # Kong Gateway
  # =============================================================================
  kong-gateway:
    image: kong:3.4-alpine
    container_name: gradeloop-kong-gateway
    restart: unless-stopped
    command: kong start
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=kong-database
      - KONG_PG_PORT=5432
      - KONG_PG_USER=kong
      - KONG_PG_PASSWORD=${KONG_DB_PASSWORD:-kong_pass}
      - KONG_PG_DB=kong
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_LOG_LEVEL=info
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
      - "8002:8002"
      - "8445:8445"
    volumes:
      - ./config:/usr/local/kong/declarative:ro
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # Kong Dashboard (Kong Manager UI)
  # =============================================================================
  kong-dashboard:
    image: kong/kong-pongo:latest
    container_name: gradeloop-kong-dashboard
    restart: unless-stopped
    command: kong-manager
    environment:
      - KONG_MANAGER_DATABASE=postgres
      - KONG_MANAGER_PG_HOST=kong-database
      - KONG_MANAGER_PG_PORT=5432
      - KONG_MANAGER_PG_USER=kong
      - KONG_MANAGER_PG_PASSWORD=${KONG_DB_PASSWORD:-kong_pass}
      - KONG_MANAGER_PG_DB=kong
      - KONG_ADMIN_URL=http://kong-gateway:8001
      - KONG_MANAGER_PORT=8002
      - KONG_MANAGER_UI_LOG_LEVEL=info
    ports:
      - "8002:8002"
    depends_on:
      kong-gateway:
        condition: service_healthy
    networks:
      - gradeloop-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

networks:
  gradeloop-network:
    external: true

volumes:
  kong-database-data:
    driver: local