name: Deploy Server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH and rebuild changed services
    runs-on: ubuntu-latest
    env:
      SSH_HOST: 62.238.43.125
      SSH_USER: ${{ secrets.SSH_USER }}
      DEPLOY_PATH: ${{ vars.SERVER_DEPLOY_PATH || '/home/gradeloop/gradeloop-core-v2' }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Detect changed compose services
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            BEFORE="$(git rev-parse "${AFTER}^")"
          fi

          mapfile -t CHANGED_FILES < <(git diff --name-only "$BEFORE" "$AFTER")

          declare -A SERVICES=()
          declare -A ALL_APP_SERVICES=(
            [gateway]=1
            [web]=1
            [iam]=1
            [academic]=1
            [assessment]=1
            [notification]=1
            [email]=1
            [ivas]=1
            [acafs]=1
            [keystroke]=1
            [cipas-syntactics]=1
            [cipas-semantics]=1
            [cipas-ai]=1
            [cipas-xai]=1
          )

          add_service() {
            SERVICES["$1"]=1
          }

          add_all_app_services() {
            for service in "${!ALL_APP_SERVICES[@]}"; do
              SERVICES["$service"]=1
            done
          }

          for file in "${CHANGED_FILES[@]}"; do
            case "$file" in
              apps/api-gateway/*) add_service gateway ;;
              apps/web/*|packages/ts/*|package.json|bun.lock|turbo.json) add_service web ;;
              apps/services/iam/*) add_service iam ;;
              apps/services/academic/*) add_service academic ;;
              apps/services/assessment/*) add_service assessment ;;
              apps/services/notification/*) add_service notification ;;
              apps/services/email/*) add_service email ;;
              apps/services/ivas/*) add_service ivas ;;
              apps/services/acafs/*) add_service acafs ;;
              apps/services/keystroke/*) add_service keystroke ;;
              apps/services/cipas-syntactics/*) add_service cipas-syntactics ;;
              apps/services/cipas-semantics/*) add_service cipas-semantics ;;
              apps/services/cipas-ai/*) add_service cipas-ai ;;
              apps/services/cipas-xai/*) add_service cipas-xai ;;
              packages/go/*)
                add_service iam
                add_service academic
                add_service assessment
                add_service notification
                add_service email
                add_service cipas-xai
                ;;
              packages/python/*)
                add_service cipas-syntactics
                add_service cipas-semantics
                add_service cipas-ai
                ;;
              infra/compose/compose.server.yaml|apps/api-gateway/nginx.server.conf) add_all_app_services ;;
              infra/compose/*) add_all_app_services ;;
            esac
          done

          if [[ ${#SERVICES[@]} -eq 0 ]]; then
            echo "services=" >> "$GITHUB_OUTPUT"
            echo "No rebuildable services changed."
            exit 0
          fi

          services="$(printf '%s\n' "${!SERVICES[@]}" | sort | tr '\n' ' ' | sed 's/[[:space:]]*$//')"
          echo "services=$services" >> "$GITHUB_OUTPUT"
          echo "Changed services: $services"

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${SSH_USER:-}" ]]; then
            echo "Missing GitHub secret: SSH_USER"
            exit 1
          fi

          if [[ -z "${SSH_PRIVATE_KEY:-}" ]]; then
            echo "Missing GitHub secret: SSH_PRIVATE_KEY"
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          keyscan_ok=false
          for attempt in 1 2 3; do
            if ssh-keyscan -T 15 -H "$SSH_HOST" >> ~/.ssh/known_hosts; then
              keyscan_ok=true
              break
            fi

            echo "ssh-keyscan failed on attempt $attempt; retrying..."
            sleep 5
          done

          if [[ "$keyscan_ok" != true ]]; then
            echo "Warning: ssh-keyscan failed after 3 attempts. SSH will use StrictHostKeyChecking=accept-new."
          fi

      - name: Deploy on server
        shell: bash
        env:
          CHANGED_SERVICES: ${{ steps.changes.outputs.services }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' CHANGED_SERVICES='$CHANGED_SERVICES' bash -s" <<'REMOTE'
          set -euo pipefail

          export COMPOSE_PARALLEL_LIMIT=1
          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1

          cd "$DEPLOY_PATH"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          test -f .env
          set -a
          source .env
          set +a

          required_vars=(
            FRONTEND_URL
            NEXT_PUBLIC_API_URL
            NEXT_PUBLIC_GATEWAY_URL
            NEXT_PUBLIC_WS_URL
            NEXT_PUBLIC_IVAS_WS_URL
            JWT_SECRET_KEY
            JWT_ACCESS_TOKEN_EXPIRY
            JWT_REFRESH_TOKEN_EXPIRY
            JWT_COOKIE_SECURE
            JWT_COOKIE_SAMESITE
            GRA_DB_USER
            GRA_DB_PASSWORD
            IAM_SVC_DB_NAME
            ACADEMIC_SVC_DB_NAME
            ASSESSMENT_SVC_DB_NAME
            EMAIL_SVC_DB_NAME
            NOTIFICATION_SVC_DB_NAME
            IVAS_SVC_DB_NAME
            ACAFS_SVC_DB_NAME
            KEYSTROKE_SVC_DB_NAME
            KEYSTROKE_DB_PASSWORD
            CIPAS_SVC_DB_NAME
            CIPAS_AI_SVC_DB_NAME
            RABBITMQ_USER
            RABBITMQ_PASSWORD
            REDIS_PASSWORD
            MINIO_ACCESS_KEY
            MINIO_SECRET_KEY
            SMTP_HOST
            SMTP_PORT
            SMTP_USER
            SMTP_PASS
            EMAIL_FROM
            IVAS_GEMINI_API_KEY
            IVAS_GEMINI_LIVE_MODEL
            IVAS_GEMINI_GRADER_MODEL
            ACAFS_OPENROUTER_API_KEY
            JUDGE0_URL
            LLM_API_KEY
            LLM_PROVIDER
            LLM_BASE_URL
            LLM_MODEL
          )

          missing=()
          for var in "${required_vars[@]}"; do
            if [[ -z "${!var:-}" ]]; then
              missing+=("$var")
            fi
          done

          if [[ ${#missing[@]} -gt 0 ]]; then
            printf 'Missing required .env variables:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

          if [[ -n "${CHANGED_SERVICES:-}" ]]; then
            echo "Building changed services one at a time: $CHANGED_SERVICES"
            for service in $CHANGED_SERVICES; do
              printf '\n[%s] Building %s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" "$service"
              docker compose --env-file .env -f infra/compose/compose.server.yaml build --progress=plain "$service"
            done

            echo "Starting updated services: $CHANGED_SERVICES"
            docker compose --env-file .env -f infra/compose/compose.server.yaml up -d --no-deps $CHANGED_SERVICES
          else
            echo "No rebuildable services changed."
          fi

          docker compose --env-file .env -f infra/compose/compose.server.yaml up -d
          docker compose --env-file .env -f infra/compose/compose.server.yaml ps
          REMOTE
