name: Deploy Server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH and Rebuild on Server
    runs-on: ubuntu-latest
    env:
      SSH_HOST: 62.238.43.125
      SSH_USER: ${{ secrets.SSH_USER }}
      DEPLOY_PATH: ${{ vars.SERVER_DEPLOY_PATH || '/home/gradeloop/gradeloop-core-v2' }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            BEFORE="$(git rev-parse "${AFTER}^")"
          fi

          mapfile -t CHANGED_FILES < <(git diff --name-only "$BEFORE" "$AFTER")

          declare -A SERVICES=()
          declare -A ALL_APP_SERVICES=(
            [gateway]=1 [web]=1 [iam]=1 [academic]=1 [assessment]=1 [notification]=1 [email]=1 
            [ivas]=1 [acafs]=1 [keystroke]=1 [cipas-syntactics]=1 [cipas-semantics]=1 [cipas-ai]=1 [cipas-xai]=1
          )

          add_service() { SERVICES["$1"]=1; }
          add_all_app_services() { for s in "${!ALL_APP_SERVICES[@]}"; do SERVICES["$s"]=1; done; }

          for file in "${CHANGED_FILES[@]}"; do
            case "$file" in
              apps/api-gateway/*) add_service gateway ;;
              apps/web/*|packages/ts/*|package.json|bun.lock|turbo.json) add_service web ;;
              apps/services/iam/*) add_service iam ;;
              apps/services/academic/*) add_service academic ;;
              apps/services/assessment/*) add_service assessment ;;
              apps/services/notification/*) add_service notification ;;
              apps/services/email/*) add_service email ;;
              apps/services/ivas/*) add_service ivas ;;
              apps/services/acafs/*) add_service acafs ;;
              apps/services/keystroke/*) add_service keystroke ;;
              apps/services/cipas-syntactics/*) add_service cipas-syntactics ;;
              apps/services/cipas-semantics/*) add_service cipas-semantics ;;
              apps/services/cipas-ai/*) add_service cipas-ai ;;
              apps/services/cipas-xai/*) add_service cipas-xai ;;
              packages/go/*) for s in iam academic assessment notification email cipas-xai; do add_service $s; done ;;
              packages/python/*) for s in cipas-syntactics cipas-semantics cipas-ai; do add_service $s; done ;;
              infra/compose/compose.server.yaml|apps/api-gateway/nginx.server.conf) add_all_app_services ;;
              infra/compose/*) add_all_app_services ;;
            esac
          done

          if [[ ${#SERVICES[@]} -eq 0 ]]; then
            echo "services=" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          services="$(printf '%s\n' "${!SERVICES[@]}" | sort | tr '\n' ' ' | sed 's/[[:space:]]*$//')"
          echo "services=$services" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "Changed services: $services"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          CHANGED_SERVICES: ${{ steps.changes.outputs.services }}
        run: |
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' CHANGED_SERVICES='$CHANGED_SERVICES' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          git fetch origin main && git checkout main && git pull origin main

          # Ensure .env exists and has correct public IP
          # We force NEXT_PUBLIC_API_URL to use the server IP if it's currently localhost
          if grep -q "localhost" .env; then
            echo "Updating .env to use server IP instead of localhost..."
            sed -i "s|localhost:8000|62.238.43.125|g" .env
            sed -i "s|localhost|62.238.43.125|g" .env
          fi

          if [[ -n "${CHANGED_SERVICES:-}" ]]; then
            echo "Building and starting: $CHANGED_SERVICES"
            docker compose -f infra/compose/compose.server.yaml build $CHANGED_SERVICES
            docker compose -f infra/compose/compose.server.yaml up -d --no-deps $CHANGED_SERVICES
          else
            echo "No services changed. Ensuring stack is up..."
            docker compose -f infra/compose/compose.server.yaml up -d
          fi

          docker compose -f infra/compose/compose.server.yaml ps
          docker image prune -f
          REMOTE


