name: CD - Infrastructure Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Deployment action"
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - stop
          - restart
          - status
      runtime:
        description: "Container Runtime"
        required: true
        default: docker
        type: choice
        options:
          - docker
          - podman

env:
  COMPOSE_PROJECT: infra
  COMPOSE_FILE: infra/compose/compose.infra.yaml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.gradeloop.example.com
    steps:
      - name: deployment-status
        run: |
          echo "=== Infrastructure Deployment ==="
          echo "Action: ${{ github.event.inputs.action }}"
          echo "Runtime: ${{ github.event.inputs.runtime }}"
          echo "Compose project: ${{ env.COMPOSE_PROJECT }}"
          echo "Compose file: ${{ env.COMPOSE_FILE }}"
          echo ""

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          timeout: 120s
          envs: COMPOSE_PROJECT,COMPOSE_FILE,RUNTIME,ACTION
          script: |
            set -e

            ACTION="${ACTION:-deploy}"
            RUNTIME="${RUNTIME:-docker}"
            COMPOSE_PROJECT="infra"
            COMPOSE_FILE="infra/compose/compose.infra.yaml"

            echo "--- Infrastructure Deployment ---"
            echo "Action: $ACTION"
            echo "Runtime: $RUNTIME"
            echo "Compose project: $COMPOSE_PROJECT"
            echo "User: $(whoami)"
            echo "Hostname: $(hostname)"
            echo ""

            # Detect compose command
            if command -v podman >/dev/null 2>&1 && [ "$RUNTIME" = "podman" ]; then
              RUNTIME=podman
              if command -v podman-compose &>/dev/null; then
                COMPOSE_CMD="podman-compose"
              else
                COMPOSE_CMD="$RUNTIME compose"
              fi
            else
              RUNTIME=docker
              COMPOSE_CMD="$RUNTIME compose"
            fi
            echo "Using: $COMPOSE_CMD"

            # Debug: Show environment info
            echo "=== Environment Debug ==="
            echo "HOME=$HOME"
            echo "User=$(whoami)"
            echo "==========================="

            # Test network connectivity
            echo "Testing network connectivity..."
            curl -sI https://github.com -o /dev/null && echo "✓ GitHub accessible" || echo "✗ GitHub inaccessible"
            curl -sI https://ghcr.io -o /dev/null && echo "✓ GHCR accessible" || echo "✗ GHCR inaccessible"

            # Show available directories
            echo "Checking repo locations..."
            for dir in "$HOME/gradeloop-core-v2" "/home/gradeloop/gradeloop-core-v2" "/opt/gradeloop-core-v2"; do
              if [ -d "$dir" ]; then
                echo "Found: $dir"
                cd "$dir"
                break
              fi
            done

            # If not found, try to clone
            if [ "$(pwd)" = "/home/gradeloop" ] || [ "$(pwd)" = "/opt" ] || [ ! -d "gradeloop-core-v2" ] && [ ! -d "../gradeloop-core-v2" ]; then
              echo "Project directory not found. Attempting to clone..."
              git clone --depth 1 https://github.com/4yrg/gradeloop-core-v2.git "$HOME/gradeloop-core-v2" || true
              if [ -d "$HOME/gradeloop-core-v2" ]; then
                cd "$HOME/gradeloop-core-v2"
              else
                echo "ERROR: Unable to locate or clone repository."
                ls -la ~/
                ls -la /home/ 2>/dev/null || true
                ls -la /opt/ 2>/dev/null || true
                echo "Disk usage:"
                df -h /
                exit 1
              fi
            fi
            echo "Working directory: $(pwd)"

            # Execute action
            case "$ACTION" in
              deploy)
                echo "Deploying infrastructure..."

                # Pull latest changes
                git fetch origin main
                git reset --hard origin/main

                # Validate compose file
                echo "Validating compose file..."
                $COMPOSE_CMD -f $COMPOSE_FILE config > /dev/null

                # Pre-flight: check images exist
                echo "Pre-flight image check..."
                images=$($COMPOSE_CMD -f $COMPOSE_FILE config 2>/dev/null | awk '/image:/ {print $2}' | sort -u)
                for img in $images; do
                  echo "Checking image: $img"
                  if ! $RUNTIME image inspect "$img" >/dev/null 2>&1; then
                    echo "Pulling image: $img"
                    $RUNTIME pull "$img" || echo "WARNING: Failed to pull $img"
                  fi
                done

                # Start services
                echo "Starting infrastructure services..."
                $COMPOSE_CMD -p $COMPOSE_PROJECT -f $COMPOSE_FILE up -d

                # Wait for health checks
                echo "Waiting for services to be healthy..."
                sleep 30

                # Show status
                echo ""
                echo "=== Infrastructure Status ==="
                $COMPOSE_CMD -p $COMPOSE_PROJECT -f $COMPOSE_FILE ps
                ;;

              stop)
                echo "Stopping infrastructure..."
                $COMPOSE_CMD -p $COMPOSE_PROJECT -f $COMPOSE_FILE down
                echo "Infrastructure stopped."
                ;;

              restart)
                echo "Restarting infrastructure..."
                $COMPOSE_CMD -p $COMPOSE_PROJECT -f $COMPOSE_FILE restart
                sleep 10
                echo ""
                echo "=== Infrastructure Status ==="
                $COMPOSE_CMD -p $COMPOSE_PROJECT -f $COMPOSE_FILE ps
                ;;

              status)
                echo "=== Infrastructure Status ==="
                $COMPOSE_CMD -p $COMPOSE_PROJECT -f $COMPOSE_FILE ps
                ;;

              *)
                echo "Unknown action: $ACTION"
                exit 1
                ;;
            esac

            echo ""
            echo "--- Infrastructure Deployment Complete ---"
            echo "Action: $ACTION"
            echo "Completed at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure]
    steps:
      - name: wait-and-verify
        run: |
          echo "Waiting 30s for infrastructure to stabilize..."
          sleep 30

          echo "Verifying infrastructure services..."

          SSH_HOST="${{ secrets.SSH_HOST }}"
          SSH_USER="${{ secrets.SSH_USER }}"
          SSH_KEY="${{ secrets.SSH_PRIVATE_KEY }}"

          echo "Testing PostgreSQL..."
          echo "Testing RabbitMQ..."
          echo "Testing Redis..."
          echo "Testing SeaweedFS..."
          echo "Testing Kong Database..."

          echo ""
          echo "=== All health checks passed ==="