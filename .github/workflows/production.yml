name: CD - Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  GHCR_PACKAGE_PREFIX: ${{ vars.GHCR_PACKAGE_PREFIX || '4yrg' }}

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # =============================================================================
  # Phase 1: Quality Checks (same as development pipeline)
  # =============================================================================

  go-checks:
    name: Go Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: apps/services/**/go.sum

      - name: Run gofmt, go vet, go mod tidy (per module)
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t modules < <(find apps/services -name go.mod -print0 2>/dev/null | xargs -0 -n1 dirname | sort)

          if [ "${#modules[@]}" -eq 0 ]; then
            echo "No Go modules found"
            exit 0
          fi

          for m in "${modules[@]}"; do
            echo "===> Module: $m"

            unformatted=$(gofmt -l "$m")
            if [ -n "$unformatted" ]; then
              echo "ERROR: Unformatted files found in $m:"
              echo "$unformatted"
              exit 1
            fi

            if ! (cd "$m" && go vet ./...); then
              echo "ERROR: go vet failed in $m"
              exit 1
            fi

            if ! (cd "$m" && go mod tidy -diff); then
              echo "ERROR: go mod tidy would make changes in $m"
              exit 1
            fi
          done

  # --------------------------------------------------------------------------
  node-checks:
    name: Node/Bun Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

  # --------------------------------------------------------------------------
  python-checks:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/services
    steps:
      - uses: actions/checkout@v4

      - name: Find Python services
        id: find-services
        run: |
          services=$(find . -maxdepth 1 -type d \( -name 'ivas' -o -name 'acafs' -o -name 'keystroke' -o -name 'cipas-*' \) 2>/dev/null | sort | tr '\n' ' ')
          echo "found=$services" >> $GITHUB_OUTPUT

      - name: Set up Python
        if: steps.find-services.outputs.found != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        if: steps.find-services.outputs.found != ''
        run: pip install --upgrade pip ruff black

      - name: Run ruff check
        if: steps.find-services.outputs.found != ''
        run: |
          for svc in ivas acafs keystroke cipas-ai cipas-semantics cipas-syntactics; do
            [ -d "$svc" ] && ruff check "$svc"
          done

      - name: Run ruff format check
        if: steps.find-services.outputs.found != ''
        run: |
          for svc in ivas acafs keystroke cipas-ai cipas-semantics cipas-syntactics; do
            [ -d "$svc" ] && ruff format --check "$svc"
          done

  # --------------------------------------------------------------------------
  # Login to GHCR (once for all build jobs)
  # --------------------------------------------------------------------------
  login-ghcr:
    name: Login to GitHub Container Registry
    runs-on: ubuntu-latest
    outputs:
      ghcr_prefix: ${{ steps.meta.outputs.ghcr_prefix }}
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Generate image prefix
        id: meta
        run: |
          echo "ghcr_prefix=${{ env.GHCR_PACKAGE_PREFIX }}" >> $GITHUB_OUTPUT

  # --------------------------------------------------------------------------
  # Build Go services
  # --------------------------------------------------------------------------
  build-go-services:
    name: Build Go Services
    runs-on: ubuntu-latest
    needs: [login-ghcr, go-checks, node-checks, python-checks]
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: iam
            context: apps/services/iam
          - service: email
            context: apps/services/email
          - service: academic
            context: apps/services/academic
          - service: assessment
            context: apps/services/assessment
          - service: cipas-xai
            context: apps/services/cipas-xai
          - service: notification
            context: apps/services/notification
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          ghcr_prefix="${{ needs.login-ghcr.outputs.ghcr_prefix }}"
          short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
          full_tag="ghcr.io/${ghcr_prefix}/gradeloop-${{ matrix.service }}"
          echo "full_tag=$full_tag"
          echo "full_tag=$full_tag" >> $GITHUB_OUTPUT
          echo "tags=${full_tag}:latest,${full_tag}:sha-${short_sha}" >> $GITHUB_OUTPUT
          echo "images=$full_tag" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: true
          sbom: true

  # --------------------------------------------------------------------------
  # Build Python services
  # --------------------------------------------------------------------------
  build-python-services:
    name: Build Python Services
    runs-on: ubuntu-latest
    needs: [login-ghcr, go-checks, node-checks, python-checks]
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: ivas
            context: apps/services/ivas
          - service: acafs
            context: apps/services/acafs
          - service: keystroke
            context: apps/services/keystroke
          - service: cipas-ai
            context: apps/services/cipas-ai
          - service: cipas-semantics
            context: apps/services/cipas-semantics
          - service: cipas-syntactics
            context: apps/services/cipas-syntactics
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          ghcr_prefix="${{ needs.login-ghcr.outputs.ghcr_prefix }}"
          short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
          full_tag="ghcr.io/${ghcr_prefix}/gradeloop-${{ matrix.service }}"
          echo "full_tag=$full_tag"
          echo "full_tag=$full_tag" >> $GITHUB_OUTPUT
          echo "tags=${full_tag}:latest,${full_tag}:sha-${short_sha}" >> $GITHUB_OUTPUT
          echo "images=$full_tag" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          no-cache: true
          provenance: true
          sbom: true

  # --------------------------------------------------------------------------
  # Build Kong gateway image
  # --------------------------------------------------------------------------
  build-gateway:
    name: Build Kong Gateway
    runs-on: ubuntu-latest
    needs: [login-ghcr, go-checks, node-checks, python-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          ghcr_prefix="${{ needs.login-ghcr.outputs.ghcr_prefix }}"
          short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
          full_tag="ghcr.io/${ghcr_prefix}/gradeloop-kong"
          echo "full_tag=$full_tag"
          echo "full_tag=$full_tag" >> $GITHUB_OUTPUT
          echo "tags=${full_tag}:latest,${full_tag}:sha-${short_sha}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull official Kong image
        run: docker pull kong:3.9.1

      - name: Tag gateway image
        run: |
          short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
          docker tag kong:3.9.1 ${{ steps.meta.outputs.full_tag }}:latest
          docker tag kong:3.9.1 ${{ steps.meta.outputs.full_tag }}:sha-${short_sha}

      - name: Push gateway image
        run: |
          short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
          docker push ${{ steps.meta.outputs.full_tag }}:latest
          docker push ${{ steps.meta.outputs.full_tag }}:sha-${short_sha}

  # --------------------------------------------------------------------------
  # Build summary
  # --------------------------------------------------------------------------
  build-complete:
    name: Build Complete
    runs-on: ubuntu-latest
    needs: [login-ghcr, build-go-services, build-python-services, build-gateway]
    steps:
      - name: Summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All images pushed to GitHub Container Registry:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| iam | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-iam |" >> $GITHUB_STEP_SUMMARY
          echo "| email | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-email |" >> $GITHUB_STEP_SUMMARY
          echo "| academic | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-academic |" >> $GITHUB_STEP_SUMMARY
          echo "| assessment | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-assessment |" >> $GITHUB_STEP_SUMMARY
          echo "| cipas-xai | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-cipas-xai |" >> $GITHUB_STEP_SUMMARY
          echo "| ivas | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-ivas |" >> $GITHUB_STEP_SUMMARY
          echo "| acafs | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-acafs |" >> $GITHUB_STEP_SUMMARY
          echo "| keystroke | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-keystroke |" >> $GITHUB_STEP_SUMMARY
          echo "| cipas-ai | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-cipas-ai |" >> $GITHUB_STEP_SUMMARY
          echo "| cipas-semantics | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-cipas-semantics |" >> $GITHUB_STEP_SUMMARY
          echo "| cipas-syntactics | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-cipas-syntactics |" >> $GITHUB_STEP_SUMMARY
          echo "| kong | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-kong |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tags: \`latest\`, \`sha-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
  # =============================================================================
  # Phase 3: Deploy to Hetzner
  # =============================================================================

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs:
      [build-complete, build-go-services, build-python-services, build-gateway]
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.runtime == 'docker'
    environment:
      name: production
      url: https://api.gradeloop.example.com
    env:
      GHCR_USER: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      SHORT_SHA: ${{ github.sha }}
      RUNTIME: docker
      COMPOSE_FILE: "infra/compose/compose.prod.images.yaml"
      GHCR_PACKAGE_PREFIX: ${{ vars.GHCR_PACKAGE_PREFIX || '4yrg' }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          timeout: 120s
          envs: RUNTIME,COMPOSE_FILE,GHCR_PACKAGE_PREFIX,SHORT_SHA,GHCR_USER,GHCR_TOKEN,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,EMAIL_FROM,JWT_SECRET_KEY
          script: |
            set -e

            RUNTIME="${RUNTIME:-docker}"
            COMPOSE_FILE="infra/compose/compose.prod.images.yaml"
            GHCR_PACKAGE_PREFIX="$GHCR_PACKAGE_PREFIX"
            SHORT_SHA=$(echo "$SHORT_SHA" | cut -c1-7)

            echo "--- Deployment Info ---"
            echo "Runtime: $RUNTIME"
            echo "Compose file: $COMPOSE_FILE"
            echo "GHCR prefix: $GHCR_PACKAGE_PREFIX"
            echo "Commit SHA: $SHORT_SHA"
            echo "User: $(whoami)"
            echo "Hostname: $(hostname)"
            echo ""

            # Detect compose command
            if command -v podman >/dev/null 2>&1 && [ "$RUNTIME" = "podman" ]; then
              RUNTIME=podman
              if command -v podman-compose &>/dev/null; then
                COMPOSE_CMD="podman-compose"
              else
                COMPOSE_CMD="$RUNTIME compose"
              fi
            else
              RUNTIME=docker
              COMPOSE_CMD="$RUNTIME compose"
            fi
            echo "Using: $COMPOSE_CMD"

            # Debug: Show environment info
            echo "=== Environment Debug ==="
            echo "HOME=$HOME"
            echo "User=$(whoami)"
            echo "==========================="

            # Test network connectivity
            echo "Testing network connectivity..."
            curl -sI https://github.com -o /dev/null && echo "✓ GitHub accessible" || echo "✗ GitHub inaccessible"
            curl -sI https://ghcr.io -o /dev/null && echo "✓ GHCR accessible" || echo "✗ GHCR inaccessible"

            # Show available directories
            echo "Checking repo locations..."
            for dir in "$HOME/gradeloop-core-v2" "/home/gradeloop/gradeloop-core-v2" "/opt/gradeloop-core-v2"; do
              if [ -d "$dir" ]; then
                echo "Found: $dir"
                cd "$dir"
                break
              fi
            done

            # If not found, try to clone
            if [ "$(pwd)" = "/home/gradeloop" ] || [ "$(pwd)" = "/opt" ] || [ ! -d "gradeloop-core-v2" ] && [ ! -d "../gradeloop-core-v2" ]; then
              echo "Project directory not found. Attempting to clone..."
              git clone --depth 1 https://github.com/4yrg/gradeloop-core-v2.git "$HOME/gradeloop-core-v2" || true
              if [ -d "$HOME/gradeloop-core-v2" ]; then
                cd "$HOME/gradeloop-core-v2"
              else
                echo "ERROR: Unable to locate or clone repository."
                ls -la ~/
                ls -la /home/ 2>/dev/null || true
                ls -la /opt/ 2>/dev/null || true
                echo "Disk usage:"
                df -h /
                exit 1
              fi
            fi
            echo "Working directory: $(pwd)"

            # Authenticate to GHCR
            if [ -n "$GHCR_TOKEN" ] && [ -n "$GHCR_USER" ]; then
              echo "Logging in to ghcr.io..."
              echo "$GHCR_TOKEN" | $RUNTIME login ghcr.io -u "$GHCR_USER" --password-stdin || { echo "ERROR: Login to ghcr.io failed - token may be invalid or expired"; df -h /; exit 1; }
            fi

            # Free up space before syncing repository updates
            echo "Disk space before git sync:"
            df -h /
            echo "Cleaning up unused images before git sync..."
            $RUNTIME image prune -a -f --filter "until=1h"

            # Fetch latest changes
            echo "Fetching latest main branch..."
            git fetch origin main
            git reset --hard origin/main

            # Build compose file with ghcr.io images
            echo "Updating compose file with ghcr.io images..."
            $COMPOSE_CMD -f $COMPOSE_FILE config > /dev/null

            echo "Disk space before deployment:"
            df -h /

            # Cleanup dangling images to free up space for new ones
            echo "Cleaning up dangling images before pull..."
            $RUNTIME image prune -f

            # Pre-flight image pull/check
            echo "Pre-flight image check..."
            images=$($COMPOSE_CMD -f $COMPOSE_FILE config 2>/dev/null | awk '/image:/ {print $2}' | sort -u)
            for img in $images; do
              echo "Checking image: $img"
              if ! $RUNTIME pull "$img"; then
                echo "WARNING: Failed to pull image $img. Pruning all unused images and trying again..."
                $RUNTIME image prune -a -f --filter "until=1h"
                if ! $RUNTIME pull "$img"; then
                  echo "ERROR: Failed to pull image $img even after cleanup."
                  df -h /
                  exit 1
                fi
              fi
            done

            # Pull images from GHCR
            echo "Pulling images from GHCR..."
            $COMPOSE_CMD -f $COMPOSE_FILE pull

            # Stop existing services gracefully
            echo "Stopping existing services..."
            $COMPOSE_CMD -f $COMPOSE_FILE down --remove-orphans 2>/dev/null || true

            # Start services with zero-downtime
            echo "Starting services (zero-downtime)..."
            $COMPOSE_CMD -f $COMPOSE_FILE up -d --remove-orphans

            # Wait for health checks
            echo "Waiting for services to be healthy..."
            sleep 30

            # Verify services are running
            echo "Verifying services..."
            $COMPOSE_CMD -f $COMPOSE_FILE ps

            # Cleanup unused images
            echo "Cleaning up unused images..."
            $RUNTIME image prune -f

            echo "--- Deployment Complete ---"
            echo "Commit: $SHORT_SHA"
            echo "Deployed at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"

  deploy-podman:
    name: Deploy to Hetzner (Podman)
    runs-on: ubuntu-latest
    needs:
      [build-complete, build-go-services, build-python-services, build-gateway]
    if: github.event.inputs.runtime == 'podman'
    environment:
      name: production
      url: https://api.gradeloop.example.com
    env:
      GHCR_USER: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      SHORT_SHA: ${{ github.sha }}
      RUNTIME: podman
      COMPOSE_FILE: "infra/compose/compose.prod.images.yaml"
      GHCR_PACKAGE_PREFIX: ${{ vars.GHCR_PACKAGE_PREFIX || '4yrg' }}
    steps:
      - name: Deploy via SSH (Podman)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          timeout: 120s
          envs: RUNTIME,COMPOSE_FILE,GHCR_PACKAGE_PREFIX,SHORT_SHA,GHCR_USER,GHCR_TOKEN,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,EMAIL_FROM
          script: |
            set -e

            RUNTIME=podman
            COMPOSE_FILE="infra/compose/compose.prod.images.yaml"
            GHCR_PACKAGE_PREFIX="$GHCR_PACKAGE_PREFIX"
            SHORT_SHA=$(echo "$SHORT_SHA" | cut -c1-7)

            echo "--- Deployment Info (Podman) ---"
            echo "Runtime: $RUNTIME"
            echo ""

            # Navigate to project directory (clone if missing)
            if [ -d "$HOME/gradeloop-core-v2" ]; then
              cd "$HOME/gradeloop-core-v2"
            elif [ -d "/opt/gradeloop-core-v2" ]; then
              cd "/opt/gradeloop-core-v2"
            else
              echo "Project directory not found. Attempting to clone..."
              git clone --depth 1 https://github.com/4yrg/gradeloop-core-v2.git "$HOME/gradeloop-core-v2" || true
              if [ -d "$HOME/gradeloop-core-v2" ]; then
                cd "$HOME/gradeloop-core-v2"
              else
                echo "ERROR: Unable to locate or clone repository."
                ls -la ~/
                ls -la /opt/ 2>/dev/null || true
                exit 1
              fi
            fi
            echo "Working directory: $(pwd)"

            # Authenticate to GHCR
            if [ -n "$GHCR_TOKEN" ] && [ -n "$GHCR_USER" ]; then
              echo "Logging in to ghcr.io..."
              echo "$GHCR_TOKEN" | $RUNTIME login ghcr.io -u "$GHCR_USER" --password-stdin || { echo "WARNING: Login to ghcr.io failed"; }
            fi

            if command -v podman-compose &>/dev/null; then
              COMPOSE_CMD="podman-compose"
            else
              COMPOSE_CMD="podman compose"
            fi

            echo "Disk space before git sync:"
            df -h /
            echo "Cleaning up unused images before git sync..."
            $RUNTIME image prune -a -f --filter "until=1h"

            git fetch origin main
            git reset --hard origin/main

            # Pre-flight image pull/check
            echo "Disk space check:"
            df -h /

            echo "Cleaning up dangling images..."
            $RUNTIME image prune -f

            echo "Pre-flight image check..."
            images=$($COMPOSE_CMD -f $COMPOSE_FILE config 2>/dev/null | awk '/image:/ {print $2}' | sort -u)
            for img in $images; do
              echo "Checking image: $img"
              if ! $RUNTIME pull "$img"; then
                echo "WARNING: Failed to pull image $img. Attempting cleanup and retry..."
                $RUNTIME image prune -a -f --filter "until=1h"
                if ! $RUNTIME pull "$img"; then
                  echo "ERROR: Failed to pull image $img"
                  df -h /
                  exit 1
                fi
              fi
            done

            echo "Pulling images from GHCR..."
            $COMPOSE_CMD -f $COMPOSE_FILE pull

            echo "Stopping existing services..."
            $COMPOSE_CMD -f $COMPOSE_FILE down --remove-orphans 2>/dev/null || true

            echo "Starting services..."
            $COMPOSE_CMD -f $COMPOSE_FILE up -d --remove-orphans

            echo "Waiting for services..."
            sleep 30

            echo "Verifying services..."
            $COMPOSE_CMD -f $COMPOSE_FILE ps

            $RUNTIME image prune -f

            echo "--- Deployment Complete ---"
            echo "Commit: $SHORT_SHA"
            echo "Deployed at: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
