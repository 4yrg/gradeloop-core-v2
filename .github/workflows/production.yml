name: CD - Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  GHCR_PACKAGE_PREFIX: ${{ vars.GHCR_PACKAGE_PREFIX || '4yrg' }}

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # =============================================================================
  # Phase 1: Quality Checks (same as development pipeline)
  # =============================================================================

  go-checks:
    name: Go Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: apps/services/**/go.sum

      - name: Run gofmt, go vet, go mod tidy (per module)
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t modules < <(find apps/services -name go.mod -print0 2>/dev/null | xargs -0 -n1 dirname | sort)

          if [ "${#modules[@]}" -eq 0 ]; then
            echo "No Go modules found"
            exit 0
          fi

          for m in "${modules[@]}"; do
            echo "===> Module: $m"

            unformatted=$(gofmt -l "$m")
            if [ -n "$unformatted" ]; then
              echo "ERROR: Unformatted files found in $m:"
              echo "$unformatted"
              exit 1
            fi

            if ! (cd "$m" && go vet ./...); then
              echo "ERROR: go vet failed in $m"
              exit 1
            fi

            if ! (cd "$m" && go mod tidy -diff); then
              echo "ERROR: go mod tidy would make changes in $m"
              exit 1
            fi
          done

  # --------------------------------------------------------------------------
  node-checks:
    name: Node/Bun Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

  # --------------------------------------------------------------------------
  python-checks:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/services
    steps:
      - uses: actions/checkout@v4

      - name: Find Python services
        id: find-services
        run: |
          services=$(find . -maxdepth 1 -type d \( -name 'ivas' -o -name 'acafs' -o -name 'keystroke' -o -name 'cipas-*' \) 2>/dev/null | sort | tr '\n' ' ')
          echo "found=$services" >> $GITHUB_OUTPUT

      - name: Set up Python
        if: steps.find-services.outputs.found != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        if: steps.find-services.outputs.found != ''
        run: pip install --upgrade pip ruff black

      - name: Run ruff check
        if: steps.find-services.outputs.found != ''
        run: |
          for svc in ivas acafs keystroke cipas-ai cipas-semantics cipas-syntactics; do
            [ -d "$svc" ] && ruff check "$svc"
          done

      - name: Run ruff format check
        if: steps.find-services.outputs.found != ''
        run: |
          for svc in ivas acafs keystroke cipas-ai cipas-semantics cipas-syntactics; do
            [ -d "$svc" ] && ruff format --check "$svc"
          done

  # --------------------------------------------------------------------------
  # Login to GHCR (once for all build jobs)
  # --------------------------------------------------------------------------
  login-ghcr:
    name: Login to GitHub Container Registry
    runs-on: ubuntu-latest
    outputs:
      ghcr_prefix: ${{ steps.meta.outputs.ghcr_prefix }}
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Generate image prefix
        id: meta
        run: |
          echo "ghcr_prefix=${{ env.GHCR_PACKAGE_PREFIX }}" >> $GITHUB_OUTPUT

  # --------------------------------------------------------------------------
  # Build Go services
  # --------------------------------------------------------------------------
  build-go-services:
    name: Build Go Services
    runs-on: ubuntu-latest
    needs: [login-ghcr, go-checks, node-checks, python-checks]
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: iam
            context: apps/services/iam
          - service: email
            context: apps/services/email
          - service: academic
            context: apps/services/academic
          - service: assessment
            context: apps/services/assessment
          - service: cipas-xai
            context: apps/services/cipas-xai
          - service: notification
            context: apps/services/notification
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          ghcr_prefix="${{ needs.login-ghcr.outputs.ghcr_prefix }}"
          short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
          full_tag="ghcr.io/${ghcr_prefix}/gradeloop-${{ matrix.service }}"
          echo "full_tag=$full_tag"
          echo "full_tag=$full_tag" >> $GITHUB_OUTPUT
          echo "tags=${full_tag}:latest,${full_tag}:sha-${short_sha}" >> $GITHUB_OUTPUT
          echo "images=$full_tag" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: true
          sbom: true

  # --------------------------------------------------------------------------
  # Build Python services
  # --------------------------------------------------------------------------
  build-python-services:
    name: Build Python Services
    runs-on: ubuntu-latest
    needs: [login-ghcr, go-checks, node-checks, python-checks]
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: ivas
            context: apps/services/ivas
          - service: acafs
            context: apps/services/acafs
          - service: keystroke
            context: apps/services/keystroke
          - service: cipas-ai
            context: apps/services/cipas-ai
            build_context: .
          - service: cipas-semantics
            context: apps/services/cipas-semantics
            build_context: .
          - service: cipas-syntactics
            context: apps/services/cipas-syntactics
            build_context: .
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          ghcr_prefix="${{ needs.login-ghcr.outputs.ghcr_prefix }}"
          short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
          full_tag="ghcr.io/${ghcr_prefix}/gradeloop-${{ matrix.service }}"
          echo "full_tag=$full_tag"
          echo "full_tag=$full_tag" >> $GITHUB_OUTPUT
          echo "tags=${full_tag}:latest,${full_tag}:sha-${short_sha}" >> $GITHUB_OUTPUT
          echo "images=$full_tag" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.build_context || matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          no-cache: true
          provenance: true
          sbom: true

  # --------------------------------------------------------------------------
  # Build Nginx gateway image
  # --------------------------------------------------------------------------
  build-gateway:
    name: Build Nginx Gateway
    runs-on: ubuntu-latest
    needs: [login-ghcr, go-checks, node-checks, python-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          ghcr_prefix="${{ needs.login-ghcr.outputs.ghcr_prefix }}"
          short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
          full_tag="ghcr.io/${ghcr_prefix}/gradeloop-gateway"
          echo "full_tag=$full_tag"
          echo "full_tag=$full_tag" >> $GITHUB_OUTPUT
          echo "tags=${full_tag}:latest,${full_tag}:sha-${short_sha}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: apps/api-gateway
          file: apps/api-gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

  # --------------------------------------------------------------------------
  # Build summary
  # --------------------------------------------------------------------------
  build-complete:
    name: Build Complete
    runs-on: ubuntu-latest
    needs: [login-ghcr, build-go-services, build-python-services, build-gateway]
    steps:
      - name: Summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All images pushed to GitHub Container Registry:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| iam | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-iam |" >> $GITHUB_STEP_SUMMARY
          echo "| email | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-email |" >> $GITHUB_STEP_SUMMARY
          echo "| academic | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-academic |" >> $GITHUB_STEP_SUMMARY
          echo "| assessment | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-assessment |" >> $GITHUB_STEP_SUMMARY
          echo "| cipas-xai | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-cipas-xai |" >> $GITHUB_STEP_SUMMARY
          echo "| ivas | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-ivas |" >> $GITHUB_STEP_SUMMARY
          echo "| acafs | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-acafs |" >> $GITHUB_STEP_SUMMARY
          echo "| keystroke | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-keystroke |" >> $GITHUB_STEP_SUMMARY
          echo "| cipas-ai | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-cipas-ai |" >> $GITHUB_STEP_SUMMARY
          echo "| cipas-semantics | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-cipas-semantics |" >> $GITHUB_STEP_SUMMARY
          echo "| cipas-syntactics | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-cipas-syntactics |" >> $GITHUB_STEP_SUMMARY
          echo "| gateway | ghcr.io/${{ needs.login-ghcr.outputs.ghcr_prefix }}/gradeloop-gateway |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tags: \`latest\`, \`sha-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
  # =============================================================================
  # Phase 2: Deploy to Hetzner
  # =============================================================================

  server-prep:
    name: Server Preparation
    runs-on: ubuntu-latest
    needs: [build-complete]
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.runtime == 'docker'
    steps:
      - name: SSH Preparation (Cleanup & Pull)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -e
            COMPOSE_FILE="infra/compose/compose.prod.images.yaml"
            GHCR_PACKAGE_PREFIX="${{ vars.GHCR_PACKAGE_PREFIX || '4yrg' }}"
            
            for dir in "$HOME/gradeloop-core-v2" "/home/gradeloop/gradeloop-core-v2" "/opt/gradeloop-core-v2"; do
              if [ -d "$dir" ]; then cd "$dir"; break; fi
            done

            echo "=== Phase 1: Disk Cleanup ==="
            docker system prune -af --filter "until=24h" || true
            docker volume prune -f || true
            
            echo "=== Phase 2: Registry Login ==="
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "=== Phase 3: Pulling All Images ==="
            GHCR_PACKAGE_PREFIX=$GHCR_PACKAGE_PREFIX docker compose -f $COMPOSE_FILE pull

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [server-prep]
    environment:
      name: production
    steps:
      - name: Start Infrastructure Stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            COMPOSE_FILE="infra/compose/compose.prod.images.yaml"
            for dir in "$HOME/gradeloop-core-v2" "/home/gradeloop/gradeloop-core-v2" "/opt/gradeloop-core-v2"; do
              if [ -d "$dir" ]; then cd "$dir"; break; fi
            done
            
            echo "=== Deploying Infrastructure (Postgres, RabbitMQ, Redis, SeaweedFS) ==="
            GHCR_PACKAGE_PREFIX="${{ vars.GHCR_PACKAGE_PREFIX || '4yrg' }}" \
            docker compose --env-file .env -f $COMPOSE_FILE up -d --remove-orphans \
            postgres postgres-keystroke rabbitmq redis seaweedfs

  deploy-core:
    name: "Deploy Core: ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [deploy-infra]
    strategy:
      fail-fast: false
      matrix:
        service: [iam, email, academic, assessment, notification, cipas-xai]
    env:
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
    steps:
      - name: Deploy Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JWT_SECRET_KEY,SMTP_USER,SMTP_PASS
          script: |
            set -e
            COMPOSE_FILE="infra/compose/compose.prod.images.yaml"
            for dir in "$HOME/gradeloop-core-v2" "/home/gradeloop/gradeloop-core-v2" "/opt/gradeloop-core-v2"; do
              if [ -d "$dir" ]; then cd "$dir"; break; fi
            done
            
            # Re-verify images are present (fast if already pulled)
            GHCR_PACKAGE_PREFIX="${{ vars.GHCR_PACKAGE_PREFIX || '4yrg' }}" \
            docker compose --env-file .env -f $COMPOSE_FILE up -d --remove-orphans ${{ matrix.service }}

  deploy-ml:
    name: "Deploy ML: ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [deploy-infra]
    strategy:
      fail-fast: false
      matrix:
        service: [ivas, acafs, keystroke, cipas-ai, cipas-semantics, cipas-syntactics]
    env:
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      ACAFS_OPENROUTER_API_KEY: ${{ secrets.ACAFS_OPENROUTER_API_KEY }}
    steps:
      - name: Deploy Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JWT_SECRET_KEY,ACAFS_OPENROUTER_API_KEY
          script: |
            set -e
            COMPOSE_FILE="infra/compose/compose.prod.images.yaml"
            for dir in "$HOME/gradeloop-core-v2" "/home/gradeloop/gradeloop-core-v2" "/opt/gradeloop-core-v2"; do
              if [ -d "$dir" ]; then cd "$dir"; break; fi
            done
            
            GHCR_PACKAGE_PREFIX="${{ vars.GHCR_PACKAGE_PREFIX || '4yrg' }}" \
            docker compose --env-file .env -f $COMPOSE_FILE up -d --remove-orphans ${{ matrix.service }}

  deploy-gateway:
    name: Deploy Gateway
    runs-on: ubuntu-latest
    needs: [deploy-core, deploy-ml]
    steps:
      - name: Deploy Gateway
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            COMPOSE_FILE="infra/compose/compose.prod.images.yaml"
            for dir in "$HOME/gradeloop-core-v2" "/home/gradeloop/gradeloop-core-v2" "/opt/gradeloop-core-v2"; do
              if [ -d "$dir" ]; then cd "$dir"; break; fi
            done
            
            echo "=== Finalizing Deployment: Starting Gateway ==="
            GHCR_PACKAGE_PREFIX="${{ vars.GHCR_PACKAGE_PREFIX || '4yrg' }}" \
            docker compose --env-file .env -f $COMPOSE_FILE up -d --remove-orphans gateway
            
            echo "=== Deployment Status ==="
            docker compose -f $COMPOSE_FILE ps
