name: CI - Quality Checks

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-checks:
    name: Go Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/services
    steps:
      - uses: actions/checkout@v4

      - name: Find Go services
        id: find-services
        run: |
          services=$(find . -maxdepth 1 -type d -name 'go-* -o -name 'iam' -o -name 'email' -o -name 'academic' -o -name 'assessment' -o -name 'cipas-xai' 2>/dev/null | grep -v '^\.$' | sort | tr '\n' ' ')
          echo "found=$services" >> $GITHUB_OUTPUT
          echo "found: $services"

      - name: Set up Go
        if: steps.find-services.outputs.found != ''
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: apps/services/**/go.sum

      - name: Run go fmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following Go files are not formatted:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run go mod tidy check
        run: |
          uncommitted=$(go mod tidy -diff 2>&1)
          if [ -n "$uncommitted" ]; then
            echo "go.mod or go.sum are not tidy:"
            echo "$uncommitted"
            exit 1
          fi

  node-checks:
    name: Node/Bun Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck

  python-checks:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/services
    steps:
      - uses: actions/checkout@v4

      - name: Find Python services
        id: find-services
        run: |
          services=$(find . -maxdepth 1 -type d \( -name 'ivas' -o -name 'acafs' -o -name 'keystroke' -o -name 'cipas-*' \) 2>/dev/null | sort | tr '\n' ' ')
          echo "found=$services" >> $GITHUB_OUTPUT

      - name: Set up Python
        if: steps.find-services.outputs.found != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        if: steps.find-services.outputs.found != ''
        run: pip install --upgrade pip ruff black

      - name: Run ruff check
        if: steps.find-services.outputs.found != ''
        run: |
          for svc in ivas acafs keystroke cipas-ai cipas-semantics cipas-syntactics; do
            [ -d "$svc" ] && ruff check "$svc"
          done

      - name: Run ruff format check
        if: steps.find-services.outputs.found != ''
        run: |
          for svc in ivas acafs keystroke cipas-ai cipas-semantics cipas-syntactics; do
            [ -d "$svc" ] && ruff format --check "$svc"
          done

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: [go-checks, node-checks, python-checks]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}