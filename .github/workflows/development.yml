name: CI - Quality Checks

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-checks:
    name: Go Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: apps/services/**/go.sum

      - name: Run gofmt, go vet, go mod tidy (per module)
        shell: bash
        run: |
          set -euo pipefail

          # Find all directories that contain a go.mod
          mapfile -t modules < <(find apps/services -name go.mod -print0 2>/dev/null | xargs -0 -n1 dirname | sort)

          if [ "${#modules[@]}" -eq 0 ]; then
            echo "No Go modules found"
            exit 0
          fi

          for m in "${modules[@]}"; do
            echo "===> Module: $m"

            # gofmt check
            unformatted=$(gofmt -l "$m")
            if [ -n "$unformatted" ]; then
              echo "Not formatted in $m:"
              echo "$unformatted"
              exit 1
            fi

            # vet check
            (cd "$m" && go vet ./...)

            # tidy check
            (cd "$m" && go mod tidy -diff)
          done

  node-checks:
    name: Node/Bun Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck

  python-checks:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/services
    steps:
      - uses: actions/checkout@v4

      - name: Find Python services
        id: find-services
        run: |
          services=$(find . -maxdepth 1 -type d \( -name 'ivas' -o -name 'acafs' -o -name 'keystroke' -o -name 'cipas-*' \) 2>/dev/null | sort | tr '\n' ' ')
          echo "found=$services" >> $GITHUB_OUTPUT

      - name: Set up Python
        if: steps.find-services.outputs.found != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        if: steps.find-services.outputs.found != ''
        run: pip install --upgrade pip ruff black

      - name: Run ruff check
        if: steps.find-services.outputs.found != ''
        run: |
          for svc in ivas acafs keystroke cipas-ai cipas-semantics cipas-syntactics; do
            [ -d "$svc" ] && ruff check "$svc"
          done

      - name: Run ruff format check
        if: steps.find-services.outputs.found != ''
        run: |
          for svc in ivas acafs keystroke cipas-ai cipas-semantics cipas-syntactics; do
            [ -d "$svc" ] && ruff format --check "$svc"
          done

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: [go-checks, node-checks, python-checks]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        if: secrets.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        if: secrets.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}