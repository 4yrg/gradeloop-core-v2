# =============================================================================
# Kong Declarative Configuration (DB-less Mode)
# =============================================================================
# Format: Kong 3.x declarative configuration
# Version: 1.0.0
# =============================================================================

_format_version: "3.0"
_transform: true

# =============================================================================
# Kong Metadata
# =============================================================================
metadata:
  environment: production
  version: "1.0.0"

# =============================================================================
# Services Configuration
# =============================================================================
services:
  # -------------------------------------------------------------------------
  # IAM Service - Authentication & Authorization
  # -------------------------------------------------------------------------
  - name: iam-service
    # Internal Docker network communication using service name
    url: http://iam-service:8081
    connect_timeout: 10000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3
    tags:
      - internal
      - auth
      - iam

# =============================================================================
# Routes Configuration
# =============================================================================
routes:
  # -------------------------------------------------------------------------
  # PUBLIC ROUTES - No authentication required
  # -------------------------------------------------------------------------

  # Login endpoint - User authentication
  - name: auth-login
    service: iam-service
    paths:
      - /api/v1/auth/login
    methods:
      - POST
    strip_path: false
    preserve_host: true
    tags:
      - public
      - auth

      - auth

  # Logout endpoint
  - name: auth-logout
    service: iam-service
    paths:
      - /api/v1/auth/logout
    methods:
      - POST
    strip_path: false
    preserve_host: true
    tags:
      - public
      - auth

  # Token refresh endpoint
  - name: auth-refresh
    service: iam-service
    paths:
      - /api/v1/auth/refresh
    methods:
      - POST
    strip_path: false
    preserve_host: true
    tags:
      - public
      - auth

  # Account activation endpoint
  - name: auth-activate
    service: iam-service
    paths:
      - /api/v1/auth/activate
    methods:
      - POST
    strip_path: false
    preserve_host: true
    tags:
      - public
      - auth

  # Forgot password endpoint
  - name: auth-forgot-password
    service: iam-service
    paths:
      - /api/v1/auth/forgot-password
    methods:
      - POST
    strip_path: false
    preserve_host: true
    tags:
      - public
      - auth

  # Reset password endpoint
  - name: auth-reset-password
    service: iam-service
    paths:
      - /api/v1/auth/reset-password
    methods:
      - POST
    strip_path: false
    preserve_host: true
    tags:
      - public
      - auth

  # -------------------------------------------------------------------------
  # PROTECTED ROUTES - JWT authentication required
  # -------------------------------------------------------------------------

  # Change password endpoint (requires authentication)
  - name: auth-change-password
    service: iam-service
    paths:
      - /api/v1/auth/change-password
    methods:
      - POST
    strip_path: false
    preserve_host: true
    tags:
      - protected
      - auth

  # User management endpoints
  - name: users
    service: iam-service
    paths:
      - /api/v1/users
    methods:
      - GET
      - POST
      - PUT
      - DELETE
    strip_path: false
    preserve_host: true
    tags:
      - protected
      - users

  # Role management endpoints
  - name: roles
    service: iam-service
    paths:
      - /api/v1/roles
    methods:
      - GET
      - POST
      - PUT
      - DELETE
    strip_path: false
    preserve_host: true
    tags:
      - protected
      - rbac

  # Permission management endpoints
  - name: permissions
    service: iam-service
    paths:
      - /api/v1/permissions
    methods:
      - GET
      - POST
      - PUT
      - DELETE
    strip_path: false
    preserve_host: true
    tags:
      - protected
      - rbac

  # Health check endpoint (public for monitoring)
  - name: health
    service: iam-service
    paths:
      - /health
    methods:
      - GET
    strip_path: false
    preserve_host: true
    tags:
      - public
      - monitoring

  # Root endpoint (public for service discovery)
  - name: root
    service: iam-service
    paths:
      - /
    methods:
      - GET
    strip_path: false
    preserve_host: true
    tags:
      - public
      - info

# =============================================================================
# Consumers Configuration
# =============================================================================
consumers:
  # IAM Client Consumer - For internal service-to-service communication
  - username: iam-client
    custom_id: iam-service-client
    tags:
      - internal
      - service

# =============================================================================
# JWT Credentials for Consumers
# =============================================================================
# Note: The 'key' and 'secret' here are used for Kong's JWT plugin validation
# They must match the JWT_SECRET_KEY environment variable
jwt_secrets:
  - consumer: iam-client
    key: gradeloop-iam-key
    secret: "#{JWT_SECRET_KEY}"
    algorithm: HS256
    tags:
      - iam
      - production

# =============================================================================
# Plugins Configuration - Global Plugins
# =============================================================================
plugins:
  # -------------------------------------------------------------------------
  # CORS Plugin - Cross-Origin Resource Sharing
  # -------------------------------------------------------------------------
  - name: cors
    config:
      # Allow frontend origin (configured via environment)
      origins:
        - "#{FRONTEND_URL}"
        - http://localhost:3000
        - http://localhost:5173
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-User-ID
        - X-User-Role
        - X-User-Permissions
        - X-Request-ID
      exposed_headers:
        - X-User-ID
        - X-User-Role
        - X-User-Permissions
        - X-Request-ID
      credentials: true
      max_age: 86400
      preflight_continue: false
    tags:
      - security
      - cors

  # -------------------------------------------------------------------------
  # Request Size Limiting - Prevent large payload attacks
  # -------------------------------------------------------------------------
  - name: request-size-limiting
    config:
      allowed_payload_size: 1048576  # 1MB in bytes
      size_unit: bytes
      custom_response_message: "Request payload too large. Maximum allowed size is 1MB."
    tags:
      - security
      - rate-limiting

  # -------------------------------------------------------------------------
  # Rate Limiting - Global rate limit (applied to all routes)
  # -------------------------------------------------------------------------
  - name: rate-limiting
    config:
      minute: 1000  # 1000 requests per minute globally
      policy: local
      limit_by: ip
      hide_client_headers: false
      fault_tolerant: true
      redis_timeout: 2000
      redis_database: 0
    tags:
      - security
      - rate-limiting

  # -------------------------------------------------------------------------
  # Request Transformer - Add security headers
  # -------------------------------------------------------------------------
  - name: request-transformer
    config:
      add:
        headers:
          - "X-Request-Source:kong-gateway"
      append:
        headers:
          - "X-Forwarded-Proto:http"
    tags:
      - security
      - headers

  # -------------------------------------------------------------------------
  # Response Transformer - Hide upstream error details in production
  # -------------------------------------------------------------------------
  - name: response-transformer
    config:
      add:
        headers:
          - "X-Powered-By:Kong-Gateway"
      remove:
        headers:
          - "Server"
          - "X-Generator"
    tags:
      - security
      - headers

  # -------------------------------------------------------------------------
  # JWT Authentication Plugin - Applied to protected routes only
  # -------------------------------------------------------------------------
  # JWT Plugin for protected auth routes
  - name: jwt
    route: auth-change-password
    config:
      key_claim_name: key
      secret_claim_name: secret
      claims_to_verify:
        - exp
      algorithm: HS256
      header_names:
        - Authorization
      query_names: []
      cookie_names: []
      run_on_preflight: true
      hide_credentials: false
      anonymous: null
      token_type: Bearer
    tags:
      - jwt
      - auth
      - protected

  # JWT Plugin for users routes
  - name: jwt
    route: users
    config:
      key_claim_name: key
      secret_claim_name: secret
      claims_to_verify:
        - exp
      algorithm: HS256
      header_names:
        - Authorization
      query_names: []
      cookie_names: []
      run_on_preflight: true
      hide_credentials: false
      anonymous: null
      token_type: Bearer
    tags:
      - jwt
      - auth
      - protected

  # JWT Plugin for roles routes
  - name: jwt
    route: roles
    config:
      key_claim_name: key
      secret_claim_name: secret
      claims_to_verify:
        - exp
      algorithm: HS256
      header_names:
        - Authorization
      query_names: []
      cookie_names: []
      run_on_preflight: true
      hide_credentials: false
      anonymous: null
      token_type: Bearer
    tags:
      - jwt
      - auth
      - protected

  # JWT Plugin for permissions routes
  - name: jwt
    route: permissions
    config:
      key_claim_name: key
      secret_claim_name: secret
      claims_to_verify:
        - exp
      algorithm: HS256
      header_names:
        - Authorization
      query_names: []
      cookie_names: []
      run_on_preflight: true
      hide_credentials: false
      anonymous: null
      token_type: Bearer
    tags:
      - jwt
      - auth
      - protected

  # -------------------------------------------------------------------------
  # Rate Limiting for Login - Prevent brute force attacks
  # -------------------------------------------------------------------------
  - name: rate-limiting
    route: auth-login
    config:
      minute: 5  # 5 requests per minute per IP
      policy: local
      limit_by: ip
      hide_client_headers: false
      fault_tolerant: true
      custom_response_message: "Too many login attempts. Please try again later."
    tags:
      - security
      - rate-limiting
      - brute-force-protection

# =============================================================================
# Upstream Configuration (Optional - for load balancing)
# =============================================================================
upstreams:
  - name: iam-service-upstream
    algorithm: round-robin
    slots: 10000
    healthchecks:
      active:
        healthy:
          interval: 5
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
        http_path: /health
        timeout: 5
        concurrency: 10
      passive:
        healthy:
          successes: 5
        unhealthy:
          http_failures: 3
          tcp_failures: 3
          timeouts: 3
    targets:
      - target: iam-service:8081
        weight: 100
    tags:
      - iam
      - upstream
