# =============================================================================
# GradeLoop Core v2 - Production Compose (Pre-built Images)
# =============================================================================
# This file is used for production deployment with pre-built images from
# GitHub Container Registry (ghcr.io).
#
# Usage:
#   docker compose -f infra/compose/compose.prod.images.yaml up -d
#
# Environment Variables:
#   GHCR_PACKAGE_PREFIX  GitHub package prefix (e.g., 4yrg)

x-ghcr-image: &ghcr_image
  pull_policy: always

services:
  # =============================================================================
  # Infrastructure (Production)
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    <<: *ghcr_image
    container_name: gradeloop-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${GRA_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - POSTGRES_DB=${IAM_SVC_DB_NAME:-iam_db}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GRA_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G

  postgres-keystroke:
    image: postgres:16-alpine
    <<: *ghcr_image
    container_name: gradeloop-postgres-keystroke
    restart: unless-stopped
    environment:
      - POSTGRES_USER=keystroke_user
      - POSTGRES_PASSWORD=${KEYSTROKE_DB_PASSWORD:-keystroke_pass}
      - POSTGRES_DB=keystroke-db
    volumes:
      - postgres-keystroke-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keystroke_user -d keystroke-db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G

  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    <<: *ghcr_image
    container_name: gradeloop-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G

  redis:
    image: redis:7-alpine
    <<: *ghcr_image
    container_name: gradeloop-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - gradeloop-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M

  seaweedfs:
    image: chrislusf/seaweedfs:3.71
    <<: *ghcr_image
    container_name: gradeloop-seaweedfs
    restart: unless-stopped
    environment:
      - WEEAD_IDENTITY=seaweedfs
    ports:
      - "9333:9333" # Master
      - "9320:9320" # Console
      - "8080:8080" # Volume server
      - "8333:8333" # S3 API
    volumes:
      - seaweed-data:/data
    networks:
      - gradeloop-network
    command: server -s3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9320/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G

  # =============================================================================
  # Kong Gateway (Production)
  # =============================================================================
  kong-migrations:
    image: ghcr.io/${GHCR_PACKAGE_PREFIX:-4yrg}/gradeloop-kong:latest
    <<: *ghcr_image
    container_name: gradeloop-kong-migrations
    restart: "no"
    command: kong migrations bootstrap
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=kong-database
      - KONG_PG_PORT=5432
      - KONG_PG_USER=kong
      - KONG_PG_PASSWORD=${KONG_DB_PASSWORD:-kong_pass}
      - KONG_PG_DB=kong
    depends_on:
      kong-database:
        condition: service_healthy
    networks:
      - gradeloop-network

  kong-gateway:
    image: ghcr.io/${GHCR_PACKAGE_PREFIX:-4yrg}/gradeloop-kong:latest
    <<: *ghcr_image
    container_name: gradeloop-kong-gateway
    restart: unless-stopped
    command: kong start
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_LOG_LEVEL=info
      - KONG_SSL_CERT=/etc/kong/ssl/kong.crt
      - KONG_SSL_CERT_KEY=/etc/kong/ssl/kong.key
      - KONG_LISTEN=0.0.0.0:8000,0.0.0.0:8443ssl
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    volumes:
      - ../../apps/api-gateway/config:/usr/local/kong/declarative:ro
      - /home/gradeloop/ssl:/etc/kong/ssl:ro
    networks:
      - gradeloop-network

  kong-database:
    image: postgres:16-alpine
    <<: *ghcr_image
    container_name: gradeloop-kong-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=kong
      - POSTGRES_PASSWORD=${KONG_DB_PASSWORD:-kong_pass}
      - POSTGRES_DB=kong
    volumes:
      - kong-database-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d kong"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M

  # =============================================================================
  # IAM Service (Go - Production)
  # =============================================================================
  iam:
    image: ghcr.io/${GHCR_PACKAGE_PREFIX:-4yrg}/gradeloop-iam:latest
    <<: *ghcr_image
    container_name: gradeloop-iam
    restart: unless-stopped
    environment:
      - SERVER_PORT=8081
      - FRONTEND_URL=${FRONTEND_URL:-https://app.gradeloop.space}
      - GRA_DB_HOST=postgres
      - GRA_DB_PORT=5432
      - GRA_DB_USER=${GRA_DB_USER:-postgres}
      - GRA_DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - GRA_DB_SSLMODE=${GRA_DB_SSLMODE:-disable}
      - DB_NAME=${IAM_SVC_DB_NAME:-iam_db}
      - EMAIL_SERVICE_URL=http://email:8082
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-seaweedfs:8333}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRY=${JWT_ACCESS_TOKEN_EXPIRY:-15}
      - JWT_REFRESH_TOKEN_EXPIRY=${JWT_REFRESH_TOKEN_EXPIRY:-10080}
      - JWT_COOKIE_SECURE=${JWT_COOKIE_SECURE:-true}
      - JWT_COOKIE_SAMESITE=${JWT_COOKIE_SAMESITE:-Lax}
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # =============================================================================
  # Academic Service (Go - Production)
  # =============================================================================
  academic:
    image: ghcr.io/${GHCR_PACKAGE_PREFIX:-4yrg}/gradeloop-academic:latest
    <<: *ghcr_image
    container_name: gradeloop-academic
    restart: unless-stopped
    environment:
      - SERVER_PORT=8083
      - GRA_DB_HOST=postgres
      - GRA_DB_PORT=5432
      - GRA_DB_USER=${GRA_DB_USER:-postgres}
      - GRA_DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - GRA_DB_SSLMODE=${GRA_DB_SSLMODE:-disable}
      - DB_NAME=${ACADEMIC_SVC_DB_NAME:-academic_db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-https://app.gradeloop.space}
      - EMAIL_SERVICE_URL=http://email:8082
      - IAM_SERVICE_URL=http://iam:8081
    depends_on:
      postgres:
        condition: service_healthy
      iam:
        condition: service_started
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # =============================================================================
  # Assessment Service (Go - Production)
  # =============================================================================
  assessment:
    image: ghcr.io/${GHCR_PACKAGE_PREFIX:-4yrg}/gradeloop-assessment:latest
    <<: *ghcr_image
    container_name: gradeloop-assessment
    restart: unless-stopped
    environment:
      - SERVER_PORT=8084
      - GRA_DB_HOST=postgres
      - GRA_DB_PORT=5432
      - GRA_DB_USER=${GRA_DB_USER:-postgres}
      - GRA_DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - GRA_DB_SSLMODE=${GRA_DB_SSLMODE:-disable}
      - DB_NAME=${ASSESSMENT_SVC_DB_NAME:-assessment_db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-https://app.gradeloop.space}
      - IAM_SERVICE_URL=http://iam:8081
      - ACADEMIC_SERVICE_URL=http://academic:8083
      - EMAIL_SERVICE_URL=http://email:8082
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-seaweedfs:8333}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # =============================================================================
  # Notification Service (Go - Production)
  # =============================================================================
  notification:
    image: ghcr.io/${GHCR_PACKAGE_PREFIX:-4yrg}/gradeloop-notification:latest
    <<: *ghcr_image
    container_name: gradeloop-notification
    restart: unless-stopped
    environment:
      - SERVER_PORT=8086
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${GRA_DB_USER:-postgres}
      - DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - DB_NAME=${NOTIFICATION_SVC_DB_NAME:-notification_db}
      - DB_SSLMODE=${GRA_DB_SSLMODE:-disable}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      - IAM_SERVICE_URL=http://iam:8081
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # =============================================================================
  # Email Service (Go - Production)
  # =============================================================================
  email:
    image: ghcr.io/${GHCR_PACKAGE_PREFIX:-4yrg}/gradeloop-email:latest
    <<: *ghcr_image
    container_name: gradeloop-email
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - SERVER_PORT=8082
      - GRA_DB_HOST=postgres
      - GRA_DB_PORT=5432
      - GRA_DB_USER=${GRA_DB_USER:-postgres}
      - GRA_DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - GRA_DB_SSLMODE=${GRA_DB_SSLMODE:-disable}
      - GRA_DB_NAME=${EMAIL_SVC_DB_NAME:-email_db}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@gradeloop.com}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # =============================================================================
  # IVAS Service (Python - Production)
  # =============================================================================
  ivas:
    image: ghcr.io/${GHCR_PACKAGE_PREFIX:-4yrg}/gradeloop-ivas:latest
    <<: *ghcr_image
    container_name: gradeloop-ivas
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - SERVICE_PORT=8101
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@postgres:5432/${IVAS_SVC_DB_NAME:-ivas_db}
      - IVAS_GEMINI_API_KEY=${IVAS_GEMINI_API_KEY}
      - IVAS_GEMINI_LIVE_MODEL=${IVAS_GEMINI_LIVE_MODEL:-gemini-3.1-flash-live-preview}
      - IVAS_GEMINI_GRADER_MODEL=${IVAS_GEMINI_GRADER_MODEL:-gemini-3.1-flash-lite-preview}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/1
      - IAM_SERVICE_URL=http://iam:8081
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G

  # =============================================================================
  # ACAFS Service (Python - Production)
  # =============================================================================
  acafs:
    image: ghcr.io/${GHCR_PACKAGE_PREFIX:-4yrg}/gradeloop-acafs:latest
    <<: *ghcr_image
    container_name: gradeloop-acafs
    restart: unless-stopped
    environment:
      - SERVER_PORT=8086
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@postgres:5432/${ACAFS_SVC_DB_NAME:-acafs_db}
      - ACAFS_OPENROUTER_API_KEY=${ACAFS_OPENROUTER_API_KEY}
      - JUDGE0_URL=${JUDGE0_URL:-http://localhost:2358}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network

  # =============================================================================
  # Keystroke Service (Python - Production)
  # =============================================================================
  keystroke:
    image: ghcr.io/${GHCR_PACKAGE_PREFIX:-4yrg}/gradeloop-keystroke:latest
    <<: *ghcr_image
    container_name: gradeloop-keystroke
    restart: unless-stopped
    environment:
      - SERVER_PORT=8003
      - DATABASE_URL=postgresql://keystroke_user:${KEYSTROKE_DB_PASSWORD:-keystroke_pass}@postgres-keystroke:5432/keystroke-db
    depends_on:
      postgres-keystroke:
        condition: service_healthy
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G

  # =============================================================================
  # CIPAS Syntactics Service (Python - Production)
  # =============================================================================
  cipas-syntactics:
    image: ghcr.io/${GHCR_PACKAGE_PREFIX:-4yrg}/gradeloop-cipas-syntactics:latest
    <<: *ghcr_image
    container_name: gradeloop-cipas-syntactics
    restart: unless-stopped
    environment:
      - CIPAS_SYNTACTICS_PORT=8086
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@postgres:5432/${CIPAS_SVC_DB_NAME:-cipas_db}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # =============================================================================
  # CIPAS Semantics Service (Python - Production)
  # =============================================================================
  cipas-semantics:
    image: ghcr.io/${GHCR_PACKAGE_PREFIX:-4yrg}/gradeloop-cipas-semantics:latest
    <<: *ghcr_image
    container_name: gradeloop-cipas-semantics
    restart: unless-stopped
    environment:
      - API_PORT=8087
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@postgres:5432/${CIPAS_SVC_DB_NAME:-cipas_db}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # =============================================================================
  # CIPAS AI Service (Python - Production)
  # =============================================================================
  cipas-ai:
    image: ghcr.io/${GHCR_PACKAGE_PREFIX:-4yrg}/gradeloop-cipas-ai:latest
    <<: *ghcr_image
    container_name: gradeloop-cipas-ai
    restart: unless-stopped
    environment:
      - CIPAS_AI_PORT=8104
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@postgres:5432/${CIPAS_AI_SVC_DB_NAME:-cipas_ai_db}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network

  # =============================================================================
  # CIPAS XAI Service (Go - Production)
  # =============================================================================
  cipas-xai:
    image: ghcr.io/${GHCR_PACKAGE_PREFIX:-4yrg}/gradeloop-cipas-xai:latest
    <<: *ghcr_image
    container_name: gradeloop-cipas-xai
    restart: unless-stopped
    environment:
      - SERVER_PORT=8085
      - LLM_API_KEY=${LLM_API_KEY:-dummy-key-for-startup}
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      - LLM_MODEL=${LLM_MODEL:-arcee-ai/trinity-large-preview:free}
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  gradeloop-network:
    driver: bridge

volumes:
  postgres-data:
  postgres-keystroke-data:
  rabbitmq-data:
  redis-data:
  seaweed-data:
  minio-data:
  kong-database-data:
