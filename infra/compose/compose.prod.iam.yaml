# =============================================================================
# GradeLoop Core v2 - Production Compose (Hardened)
# =============================================================================
# Production-grade configuration with Zero Trust, mTLS, and full security
#
# Usage:
#   docker compose -f compose.prod.yaml up -d
#   docker compose -f compose.prod.yaml logs -f iam
#
# SECURITY REQUIREMENTS:
#   - All secrets must be set via environment or secrets
#   - mTLS enforced between services (via Kong)
#   - Strict RBAC + ABAC enabled
#   - Full audit logging
#   - No debug endpoints

services:
  # =============================================================================
  # Infrastructure (Production)
  # =============================================================================
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: gradeloop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${GRA_DB_USER}
      POSTGRES_PASSWORD: ${GRA_DB_PASSWORD}
      POSTGRES_DB: ${IAM_SVC_DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gradeloop-internal
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GRA_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/redis:7-alpine
    container_name: gradeloop-redis
    restart: unless-stopped
    ports: []
    volumes:
      - redis-data:/data
    networks:
      - gradeloop-internal
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 0
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Keycloak (Production - External recommended)
  # =============================================================================
  keycloak:
    image: docker.io/quay.io/keycloak/keycloak:24.0
    container_name: gradeloop-keycloak
    restart: unless-stopped
    command: >
      start
      --hostname=${KEYCLOAK_HOSTNAME}
      --hostname-strict=true
      --hostname-strict-https=true
      --db=postgres
      --db-url=jdbc:postgresql://${KEYCLOAK_DB_HOST}:5432/${KEYCLOAK_DB_NAME}
      --db-username=${KEYCLOAK_DB_USER}
      --db-password=${KEYCLOAK_DB_PASSWORD}
      --https-key-store-file=/etc/keycloak/keystore.p12
      --https-key-store-password=${KEYCLOAK_KEYSTORE_PASSWORD}
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_PROXY: edge
    ports: []
    volumes:
      - keycloak-data:/data
      - ./certs:/etc/keycloak:ro
    networks:
      - gradeloop-internal
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # =============================================================================
  # API Gateway (Kong with mTLS)
  # =============================================================================
  kong:
    image: docker.io/kong:3.4
    container_name: gradeloop-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_LOG_LEVEL: warn
      KONG_SSL_CERT: /certs/kong.crt
      KONG_SSL_CERT_KEY: /certs/kong.key
      KONG_CLIENT_MAX_BODY_SIZE: 100m
      KONG_PROXY_BUFFERING: "off"
    ports:
      - "80:8000"
      - "443:8443"
      - "8444:8444"
    volumes:
      - ./kong/config:/usr/local/kong/declarative:ro
      - ./certs:/certs:ro
    networks:
      - gradeloop-internal
      - gradeloop-public
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # =============================================================================
  # IAM Service (Production - Hardened)
  # =============================================================================
  iam:
    image: ${IAM_IMAGE:-gradeloop/iam:latest}
    container_name: gradeloop-iam
    restart: unless-stopped
    environment:
      - ENV=production
      - SERVER_PORT=8081
      
      # Database (SSL required in prod)
      - GRA_DB_HOST=gradeloop-postgres
      - GRA_DB_PORT=5432
      - GRA_DB_USER=${GRA_DB_USER}
      - GRA_DB_PASSWORD=${GRA_DB_PASSWORD}
      - IAM_SVC_DB_NAME=${IAM_SVC_DB_NAME}
      - GRA_DB_SSLMODE=require
      
      # Redis (with auth)
      - REDIS_HOST=gradeloop-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_TLS=true
      - REDIS_TLS_INSECURE=false
      
      # JWT / Keycloak (Production URLs)
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRY=${JWT_ACCESS_TOKEN_EXPIRY:-15}
      - JWT_REFRESH_TOKEN_EXPIRY=${JWT_REFRESH_TOKEN_EXPIRY:-10080}
      - JWT_COOKIE_SECURE=true
      - JWT_COOKIE_SAMESITE=Strict
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-gradeloop-lms}
      - KEYCLOAK_CLIENT_ID=lms-api
      - KEYCLOAK_JWKS_TTL=86400
      - KEYCLOAK_DEFAULT_TENANT=
      - JWT_ISSUER=${KEYCLOAK_ISSUER}
      
      # SECURITY MODES (PRODUCTION - STRICT)
      - AUTHZ_MODE=strict
      - AUTHZ_AUDIT_ENABLED=true
      - AUTHZ_AUDIT_RETENTION_DAYS=365
      - SSO_MODE=real
      - SSO_JIT_ENABLED=true
      - SSO_DEFAULT_ROLE=student
      # LTI (strict mode)
      - LTI_MODE=strict
      - LTI_PLATFORM_URL=${LTI_PLATFORM_URL}
      - LTI_CLIENT_ID=${LTI_CLIENT_ID}
      - LTI_DEPLOYMENT_ID=${LTI_DEPLOYMENT_ID}
      - LTI_ISSUER=${LTI_ISSUER}
      - LTI_NRPS_ENABLED=true
      - LTI_AGS_ENABLED=true
      - LTI_DEEP_LINKING_ENABLED=true
      - LTI_1_1_ENABLED=false
      - LTI_NONCE_TTL=300
      # Zero Trust (strict)
      - ZERO_TRUST_MODE=strict
      - ZERO_TRUST_ENABLED=true
      - DEVICE_TRUST_MODE=strict
      - DEVICE_FINGERPRINT_REQUIRED=true
      - MAX_SESSION_AGE_HOURS=8
      - SESSION_VALIDATION_INTERVAL_SEC=300
      - REQUIRE_MFA=${REQUIRE_MFA:-false}
      - MTLS_ENABLED=true
      # IP reputation
      - IP_REPUTATION_ENABLED=false
      # Rate limiting
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_PER_MINUTE=100
    ports: []
    volumes: []
    networks:
      - gradeloop-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  gradeloop-internal:
    driver: bridge
    internal: true
  gradeloop-public:
    driver: bridge

volumes:
  postgres-data:
  keycloak-data:
  redis-data:
