# =============================================================================
# GradeLoop Core v2 - Production Compose
# =============================================================================
# This file runs everything in Docker for production deployment
# Uses optimized production images without source mounting

x-shared-environment: &shared_env
  GRA_DB_USER: ${GRA_DB_USER:-postgres}
  GRA_DB_PASSWORD: ${GRA_DB_PASSWORD:-postgres}
  GRA_DB_HOST: postgres
  GRA_DB_PORT: 5432
  GRA_DB_SSLMODE: ${GRA_DB_SSLMODE:-disable}

services:
  # =============================================================================
  # Infrastructure (Production)
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    pull_policy: missing
    container_name: gradeloop-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${GRA_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - POSTGRES_DB=${IAM_SVC_DB_NAME:-iam_db}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: "pg_isready -U ${GRA_DB_USER:-postgres}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G

  postgres-keystroke:
    image: postgres:16-alpine
    pull_policy: missing
    container_name: gradeloop-postgres-keystroke
    restart: unless-stopped
    environment:
      - POSTGRES_USER=keystroke_user
      - POSTGRES_PASSWORD=${KEYSTROKE_DB_PASSWORD:-keystroke_pass}
      - POSTGRES_DB=keystroke-db
    volumes:
      - postgres-keystroke-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    pull_policy: missing
    container_name: gradeloop-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G

  redis:
    image: redis:7-alpine
    pull_policy: missing
    container_name: gradeloop-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - gradeloop-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M

  seaweed:
    image: chrislusf/seaweedfs:3.71
    pull_policy: missing
    container_name: gradeloop-seaweed
    restart: unless-stopped
    ports:
      - "9333:9333" # Master
      - "8333:8333" # S3 API
      - "8888:8888" # Filer
      - "8080:8080" # Volume server
    volumes:
      - seaweed-data:/data
      - ../../infra/compose/s3Config.json:/etc/seaweedfs/s3.json:ro
    networks:
      - gradeloop-network
    command: server -s3 -filer -s3.config=/etc/seaweedfs/s3.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G

  # =============================================================================
  # API Gateway (Nginx)
  # =============================================================================
  gateway:
    build:
      context: ../../apps/api-gateway
      dockerfile: Dockerfile
    container_name: gradeloop-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8443:8443"
    volumes:
      - ../../apps/api-gateway/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /home/gradeloop/ssl:/etc/nginx/ssl:ro
    depends_on:
      - iam
      - academic
      - assessment
      - notification
      - email
      - acafs
      - ivas
      - keystroke
      - cipas-xai
      - cipas-ai
      - cipas-semantics
      - cipas-syntactics
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # =============================================================================
  # IAM Service (Go - Production)
  # =============================================================================
  iam:
    build:
      context: ../../
      dockerfile: apps/services/iam/Dockerfile
      target: production
    container_name: gradeloop-iam
    restart: unless-stopped
    environment:
      <<: *shared_env
      SERVER_PORT: 8081
      IAM_SVC_DB_NAME: ${IAM_SVC_DB_NAME:-iam_db}
      EMAIL_SERVICE_URL: http://email:8082
      MINIO_ENDPOINT: seaweed:9333
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY:-15}
      JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_TOKEN_EXPIRY:-10080}
    depends_on:
      postgres:
        condition: service_healthy
      seaweed:
        condition: service_started
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # =============================================================================
  # Academic Service (Go - Production)
  # =============================================================================
  academic:
    build:
      context: ../../
      dockerfile: apps/services/academic/Dockerfile
      target: production
    container_name: gradeloop-academic
    restart: unless-stopped
    environment:
      <<: *shared_env
      SERVER_PORT: 8083
      ACADEMIC_SVC_DB_NAME: ${ACADEMIC_SVC_DB_NAME:-academic_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      EMAIL_SERVICE_URL: http://email:8082
      IAM_SERVICE_URL: http://iam:8081
    depends_on:
      postgres:
        condition: service_healthy
      iam:
        condition: service_started
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # =============================================================================
  # Assessment Service (Go - Production)
  # =============================================================================
  assessment:
    build:
      context: ../../
      dockerfile: apps/services/assessment/Dockerfile
      target: production
    container_name: gradeloop-assessment
    restart: unless-stopped
    environment:
      <<: *shared_env
      SERVER_PORT: 8084
      ASSESSMENT_SVC_DB_NAME: ${ASSESSMENT_SVC_DB_NAME:-assessment_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      IAM_SERVICE_URL: http://iam:8081
      ACADEMIC_SERVICE_URL: http://academic:8083
      EMAIL_SERVICE_URL: http://email:8082
      MINIO_ENDPOINT: seaweed:9333
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-root}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-root}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      JUDGE0_URL: ${JUDGE0_URL:-http://57.155.90.222:2358}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # =============================================================================
  # Notification Service (Go - Production)
  # =============================================================================
  notification:
    build:
      context: ../../
      dockerfile: apps/services/notification/Dockerfile
      target: production
    container_name: gradeloop-notification
    restart: unless-stopped
    environment:
      <<: *shared_env
      SERVER_PORT: 8086
      NOTIFICATION_SVC_DB_NAME: ${NOTIFICATION_SVC_DB_NAME:-notification_db}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      IAM_SERVICE_URL: http://iam:8081
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # =============================================================================
  # Email Service (Go - Production)
  # =============================================================================
  email:
    build:
      context: ../../
      dockerfile: apps/services/email/Dockerfile
      target: production
    container_name: gradeloop-email
    restart: unless-stopped
    environment:
      <<: *shared_env
      SERVER_PORT: 8082
      EMAIL_SVC_DB_NAME: ${EMAIL_SVC_DB_NAME:-email_db}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # =============================================================================
  # IVAS Service (Python - Production)
  # =============================================================================
  ivas:
    build:
      context: ../../apps/services/ivas
      dockerfile: Dockerfile
      target: production
    container_name: gradeloop-ivas
    restart: unless-stopped
    environment:
      - SERVICE_PORT=8101
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@postgres:5432/${IVAS_SVC_DB_NAME:-ivas_db}
      - IVAS_GEMINI_API_KEY=${IVAS_GEMINI_API_KEY}
      - IVAS_GEMINI_LIVE_MODEL=${IVAS_GEMINI_LIVE_MODEL:-gemini-2.0-flash-live-001}
      - IVAS_GEMINI_GRADER_MODEL=${IVAS_GEMINI_GRADER_MODEL:-gemini-2.5-flash}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/1
      - IAM_SERVICE_URL=http://iam:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/api/v1/ivas/ready"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 4G

  # =============================================================================
  # ACAFS Service (Python - Production)
  # =============================================================================
  acafs:
    build:
      context: ../../apps/services/acafs
      dockerfile: Dockerfile
      target: production
    container_name: gradeloop-acafs
    restart: unless-stopped
    environment:
      - SERVER_PORT=8102
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@postgres:5432/${ACAFS_SVC_DB_NAME:-acafs_db}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      - ACAFS_OPENROUTER_API_KEY=${ACAFS_OPENROUTER_API_KEY}
      - ACAFS_CHAT_MODEL=${ACAFS_CHAT_MODEL:-openai/gpt-oss-120b:free}
      - ACAFS_REASONER_MODEL=${ACAFS_REASONER_MODEL:-openai/gpt-oss-120b:free}
      - ACAFS_GRADER_MODEL=${ACAFS_GRADER_MODEL:-openai/gpt-oss-120b:free}
      - JUDGE0_URL=${JUDGE0_URL:-http://57.155.90.222:2358}
      - MINIO_ENDPOINT=seaweed:8333
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-root}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-root}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8102/api/v1/acafs/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G

  # =============================================================================
  # Keystroke Service (Python - Production)
  # =============================================================================
  keystroke:
    build:
      context: ../../apps/services/keystroke
      dockerfile: Dockerfile
      target: production
    container_name: gradeloop-keystroke
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - SERVER_PORT=8103
      - DATABASE_URL=postgresql://keystroke_user:${KEYSTROKE_DB_PASSWORD:-keystroke_pass}@postgres-keystroke:5432/keystroke-db
      - GEMINI_API_KEY=${KEYSTROKE_GEMINI_API_KEY:-}
    depends_on:
      postgres-keystroke:
        condition: service_healthy
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G

  # =============================================================================
  # CIPAS Syntactics Service (Python - Production)
  # =============================================================================
  cipas-syntactics:
    build:
      context: ../../
      dockerfile: apps/services/cipas-syntactics/Dockerfile
      target: production
    container_name: gradeloop-cipas-syntactics
    restart: unless-stopped
    environment:
      - CIPAS_SYNTACTICS_PORT=8106
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@postgres:5432/${CIPAS_SVC_DB_NAME:-cipas_db}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # =============================================================================
  # CIPAS Semantics Service (Python - Production)
  # =============================================================================
  cipas-semantics:
    build:
      context: ../../
      dockerfile: apps/services/cipas-semantics/Dockerfile
      target: production
    container_name: gradeloop-cipas-semantics
    restart: unless-stopped
    environment:
      - API_PORT=8105
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@postgres:5432/${CIPAS_SVC_DB_NAME:-cipas_db}
      - HF_HOME=/app/.cache
      - TRANSFORMERS_CACHE=/app/.cache/transformers
      - HF_DATASETS_CACHE=/app/.cache/datasets
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8105/api/v1/semantics/health', timeout=5)"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 300s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # =============================================================================
  # CIPAS AI Service (Python - Production)
  # =============================================================================
  cipas-ai:
    build:
      context: ../../
      dockerfile: apps/services/cipas-ai/Dockerfile
      target: production
    container_name: gradeloop-cipas-ai
    restart: unless-stopped
    environment:
      - CIPAS_AI_PORT=8104
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@postgres:5432/${CIPAS_AI_SVC_DB_NAME:-cipas_ai_db}
      - HF_HOME=/app/.cache
      - TRANSFORMERS_CACHE=/app/.cache/transformers
      - HF_DATASETS_CACHE=/app/.cache/datasets
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8104/api/v1/ai/ready', timeout=5)"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 300s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G

  # =============================================================================
  # CIPAS XAI Service (Go - Production)
  # =============================================================================
  cipas-xai:
    build:
      context: ../../
      dockerfile: apps/services/cipas-xai/Dockerfile
      target: production
    container_name: gradeloop-cipas-xai
    restart: unless-stopped
    environment:
      - SERVER_PORT=8085
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      - LLM_MODEL=${LLM_MODEL:-arcee-ai/trinity-large-preview:free}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-60}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - gradeloop-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  gradeloop-network:
    driver: bridge

volumes:
  postgres-data:
  postgres-keystroke-data:
  rabbitmq-data:
  redis-data:
  seaweed-data:
  minio-data:
