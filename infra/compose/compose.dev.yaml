# =============================================================================
# GradeLoop Core v2 - Development Compose
# =============================================================================
# This file runs ALL services in Docker for development/testing
#
# Usage:
#   docker compose -f compose.dev.yaml up -d           # Start all in background
#   docker compose -f compose.dev.yaml up              # Start all with logs
#   docker compose -f compose.dev.yaml down             # Stop all
#   docker compose -f compose.dev.yaml logs -f <svc> # View service logs
#
# To run locally instead (recommended for dev):
#   docker compose up -d                               # Start infrastructure only
#   make dev SERVICE=<name>                         # Run services locally

services:
  # =============================================================================
  # Infrastructure (always needed)
  # =============================================================================
  postgres:
    image: docker.io/postgres:16-alpine
    pull_policy: missing
    container_name: gradeloop-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${GRA_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - POSTGRES_DB=${IAM_SVC_DB_NAME:-iam_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: "pg_isready -U ${GRA_DB_USER:-postgres}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-keystroke:
    image: docker.io/postgres:16-alpine
    pull_policy: missing
    container_name: gradeloop-postgres-keystroke
    restart: unless-stopped
    environment:
      - POSTGRES_USER=keystroke_user
      - POSTGRES_PASSWORD=keystroke_pass
      - POSTGRES_DB=keystroke-db
    ports:
      - "5433:5432"
    volumes:
      - postgres-keystroke-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: "pg_isready -U keystroke_user -d keystroke-db"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  rabbitmq:
    image: docker.io/rabbitmq:3.13-management-alpine
    pull_policy: missing
    container_name: gradeloop-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: docker.io/redis:7-alpine
    pull_policy: missing
    container_name: gradeloop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gradeloop-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_pass}", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  seaweed:
    image: docker.io/chrislusf/seaweedfs:3.71
    pull_policy: missing
    container_name: gradeloop-seaweed
    restart: unless-stopped
    environment:
      - WEEAD_IDENTITY=seaweedfs
    ports:
      - "9333:9333"   # Master
      - "9320:9320"   # Console
      - "9080:8080"   # Volume server
      - "8333:8333"   # S3 API
    volumes:
      - seaweed-data:/data
    networks:
      - gradeloop-network
    command: server -s3 -filer
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =============================================================================
  # Kong Gateway
  # =============================================================================
  kong-database:
    image: docker.io/postgres:16-alpine
    pull_policy: missing
    container_name: gradeloop-kong-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=kong
      - POSTGRES_PASSWORD=${KONG_DB_PASSWORD:-kong_pass}
      - POSTGRES_DB=kong
    ports:
      - "5434:5432"
    volumes:
      - kong-database-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: "pg_isready -U kong -d kong"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  kong-migrations:
    image: docker.io/kong:3.4
    pull_policy: missing
    container_name: gradeloop-kong-migrations
    restart: "no"
    command: kong migrations bootstrap
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=kong-database
      - KONG_PG_PORT=5432
      - KONG_PG_USER=kong
      - KONG_PG_PASSWORD=${KONG_DB_PASSWORD:-kong_pass}
      - KONG_PG_DB=kong
    depends_on:
      kong-database:
        condition: service_healthy
    networks:
      - gradeloop-network

  kong-gateway:
    image: docker.io/kong:3.4
    pull_policy: missing
    container_name: gradeloop-kong-gateway
    restart: unless-stopped
    command: kong start
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_LOG_LEVEL=info
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    volumes:
      - ../../apps/api-gateway/config:/usr/local/kong/declarative:ro
    networks:
      - gradeloop-network
    depends_on:
      kong-migrations:
        condition: service_completed_successfully

  # =============================================================================
  # IAM Service (Go)
  # =============================================================================
  iam:
    build:
      context: ../../apps/services/iam
      dockerfile: Dockerfile
      target: dev
    container_name: gradeloop-iam
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - SERVER_PORT=${IAM_SVC_PORT:-8081}
      - DB_HOST=gradeloop-postgres
      - DB_PORT=5432
      - DB_USER=${GRA_DB_USER:-postgres}
      - DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - DB_NAME=${IAM_SVC_DB_NAME:-iam_db}
      - DB_SSLMODE=${GRA_DB_SSLMODE:-disable}
      - EMAIL_SERVICE_URL=http://gradeloop-email:8082
      - MINIO_ENDPOINT=gradeloop-seaweed:8333
      - MINIO_ACCESS_KEY=root
      - MINIO_SECRET_KEY=root
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-gradeloop_secret_key_change_me}
    expose:
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
      seaweed:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # =============================================================================
  # Academic Service (Go)
  # =============================================================================
  academic:
    build:
      context: ../../apps/services/academic
      dockerfile: Dockerfile
      target: dev
    container_name: gradeloop-academic
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - SERVER_PORT=${ACADEMIC_SVC_PORT:-8083}
      - DB_HOST=gradeloop-postgres
      - DB_PORT=5432
      - DB_USER=${GRA_DB_USER:-postgres}
      - DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - DB_NAME=${ACADEMIC_SVC_DB_NAME:-academic_db}
      - IAM_SERVICE_URL=http://gradeloop-iam:8081
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-gradeloop_secret_key_change_me}
    expose:
      - "8083"
    depends_on:
      postgres:
        condition: service_healthy
      iam:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # =============================================================================
  # Assessment Service (Go)
  # =============================================================================
  assessment:
    build:
      context: ../../apps/services/assessment
      dockerfile: Dockerfile
      target: dev
    container_name: gradeloop-assessment
    restart: unless-stopped
    environment:
      - SERVER_PORT=${ASSESSMENT_SVC_PORT:-8084}
      - DB_HOST=gradeloop-postgres
      - DB_PORT=5432
      - DB_USER=${GRA_DB_USER:-postgres}
      - DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - DB_NAME=${ASSESSMENT_SVC_DB_NAME:-assessment_db}
      - ACADEMIC_SERVICE_URL=http://gradeloop-academic:8083
      - MINIO_ENDPOINT=gradeloop-seaweed:8333
      - MINIO_ACCESS_KEY=root
      - MINIO_SECRET_KEY=root
      - RABBITMQ_URL=amqp://guest:guest@gradeloop-rabbitmq:5672/
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-gradeloop_secret_key_change_me}
    expose:
      - "8084"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seaweed:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # =============================================================================
  # Email Service (Go)
  # =============================================================================
  email:
    build:
      context: ../../apps/services/email
      dockerfile: Dockerfile
      target: dev
    container_name: gradeloop-email
    restart: unless-stopped
    environment:
      - SERVER_PORT=${EMAIL_SVC_PORT:-8082}
      - DB_HOST=gradeloop-postgres
      - DB_PORT=5432
      - DB_USER=${GRA_DB_USER:-postgres}
      - DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - DB_NAME=${EMAIL_SVC_DB_NAME:-email_db}
      - RABBITMQ_URL=amqp://guest:guest@gradeloop-rabbitmq:5672/
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-gradeloop_secret_key_change_me}
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@gradeloop.com}
    expose:
      - "8082"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # =============================================================================
  # IVAS Service (Python)
  # =============================================================================
  ivas:
    build:
      context: ../../apps/services/ivas
      dockerfile: Dockerfile
      target: development
    environment:
      - SERVICE_PORT=${IVAS_SVC_PORT:-8101}
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@gradeloop-postgres:5432/${IVAS_SVC_DB_NAME:-ivas_db}
      - PYTHONPATH=/app:/packages/python
    volumes:
      - ../../apps/services/ivas:/app
      - ../../packages/python:/packages/python
    expose:
      - "8101"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8101/api/v1/ivas/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # =============================================================================
  # ACAFS Service (Python)
  # =============================================================================
  acafs:
    build:
      context: ../../apps/services/acafs
      dockerfile: Dockerfile
      target: development
    environment:
      - SERVICE_PORT=${ACAFS_SVC_PORT:-8102}
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@gradeloop-postgres:5432/${ACAFS_SVC_DB_NAME:-acafs_db}
      - MINIO_ENDPOINT=gradeloop-seaweed:8333
      - MINIO_ACCESS_KEY=root
      - MINIO_SECRET_KEY=root
      - PYTHONPATH=/app:/packages/python
    volumes:
      - ../../apps/services/acafs:/app
      - ../../packages/python:/packages/python
    expose:
      - "8102"
    depends_on:
      postgres:
        condition: service_healthy
      seaweed:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8102/api/v1/acafs/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # =============================================================================
  # Keystroke Service (Python)
  # =============================================================================
  keystroke:
    build:
      context: ../../apps/services/keystroke
      dockerfile: Dockerfile
      target: development
    environment:
      - PORT=${KEYSTROKE_SVC_PORT:-8103}
      - DATABASE_URL=postgresql://keystroke_user:keystroke_pass@gradeloop-postgres-keystroke:5432/keystroke-db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@gradeloop-redis:6379
      - PYTHONPATH=/app:/packages/python
    volumes:
      - ../../apps/services/keystroke:/app
      - ../../packages/python:/packages/python
    expose:
      - "8103"
    depends_on:
      postgres-keystroke:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8103/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # =============================================================================
  # CIPAS Syntactics Service (Python)
  # =============================================================================
  cipas-syntactics:
    build:
      context: ../../apps/services/cipas-syntactics
      dockerfile: Dockerfile
      target: development
    environment:
      - CIPAS_SYNTACTICS_PORT=${CIPAS_SYN_SVC_PORT:-8106}
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@gradeloop-postgres:5432/${CIPAS_SVC_DB_NAME:-cipas_db}
      - PYTHONPATH=/app:/packages/python
    volumes:
      - ../../apps/services/cipas-syntactics:/app
      - ../../packages/python:/packages/python
    expose:
      - "8106"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8106/api/v1/syntactics/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # =============================================================================
  # CIPAS Semantics Service (Python)
  # =============================================================================
  cipas-semantics:
    build:
      context: ../../apps/services/cipas-semantics
      dockerfile: Dockerfile
      target: development
    environment:
      - API_PORT=${CIPAS_SEM_SVC_PORT:-8105}
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@gradeloop-postgres:5432/${CIPAS_SVC_DB_NAME:-cipas_db}
      - PYTHONPATH=/app:/packages/python
    volumes:
      - ../../apps/services/cipas-semantics:/app
      - ../../packages/python:/packages/python
    expose:
      - "8105"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8105/api/v1/semantics/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # =============================================================================
  # CIPAS AI Service (Python)
  # =============================================================================
  cipas-ai:
    build:
      context: ../../apps/services/cipas-ai
      dockerfile: Dockerfile
      target: development
    environment:
      - CIPAS_AI_PORT=${CIPAS_AI_SVC_PORT:-8104}
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@gradeloop-postgres:5432/${CIPAS_AI_SVC_DB_NAME:-cipas_ai_db}
      - PYTHONPATH=/app:/packages/python
    volumes:
      - ../../apps/services/cipas-ai:/app
      - ../../packages/python:/packages/python
    expose:
      - "8104"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8104/api/v1/ai/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # =============================================================================
  # CIPAS XAI Service (Go)
  # =============================================================================
  cipas-xai:
    build:
      context: ../../apps/services/cipas-xai
      dockerfile: Dockerfile
      target: dev
    container_name: gradeloop-cipas-xai
    restart: unless-stopped
    environment:
      - SERVER_PORT=${CIPAS_XAI_SVC_PORT:-8085}
      - LLM_API_KEY=${LLM_API_KEY:-placeholder_key_change_me}
    expose:
      - "8085"
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  gradeloop-network:
    driver: bridge

volumes:
  postgres-data:
    name: gradeloop-postgres-data
  postgres-keystroke-data:
    name: gradeloop-postgres-keystroke-data
  rabbitmq-data:
    name: gradeloop-rabbitmq-data
  redis-data:
    name: gradeloop-redis-data
  seaweed-data:
    name: gradeloop-seaweed-data
  kong-database-data:
    name: gradeloop-kong-db-data
