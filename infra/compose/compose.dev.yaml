# =============================================================================
# GradeLoop Core v2 - Development Compose
# =============================================================================
# This file runs ALL services in Docker for development/testing
#
# Usage:
#   docker compose -f compose.dev.yaml up -d           # Start all in background
#   docker compose -f compose.dev.yaml up              # Start all with logs
#   docker compose -f compose.dev.yaml down             # Stop all
#   docker compose -f compose.dev.yaml logs -f <svc> # View service logs
#
# To run locally instead (recommended for dev):
#   docker compose up -d                               # Start infrastructure only
#   make dev SERVICE=<name>                         # Run services locally

services:
  # =============================================================================
  # Infrastructure (always needed)
  # =============================================================================
  postgres:
    image: docker.io/ postgres:16-alpine
    container_name: gradeloop-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${GRA_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - POSTGRES_DB=${IAM_SVC_DB_NAME:-iam_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GRA_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres-keystroke:
    image: docker.io/ postgres:16-alpine
    container_name: gradeloop-postgres-keystroke
    restart: unless-stopped
    environment:
      - POSTGRES_USER=keystroke_user
      - POSTGRES_PASSWORD=keystroke_pass
      - POSTGRES_DB=keystroke-db
    ports:
      - "5433:5432"
    volumes:
      - postgres-keystroke-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keystroke_user -d keystroke-db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  rabbitmq:
    image: docker.io/ rabbitmq:3.13-management-alpine
    container_name: gradeloop-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: docker.io/ redis:7-alpine
    container_name: gradeloop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gradeloop-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  seaweed:
    image: docker.io/seaweedfs/seaweedfs:3.71
    container_name: gradeloop-seaweed
    restart: unless-stopped
    environment:
      - WEEAD_IDENTITY=seaweedfs
    ports:
      - "9333:9333"   # S3 API
      - "9320:9320"   # Console
      - "9080:8080"   # Volume server
    volumes:
      - seaweed-data:/data
    networks:
      - gradeloop-network
    command: server -s3 -identity=seaweedfs -s3Port=9333 -consolePort=9320
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9320/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =============================================================================
  # Kong Gateway (Optional - can run separately)
  # =============================================================================
  kong-gateway:
    image: docker.io/ kong:3.4-alpine
    container_name: gradeloop-kong-gateway
    restart: unless-stopped
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=kong-database
      - KONG_PG_PORT=5432
      - KONG_PG_USER=kong
      - KONG_PG_PASSWORD=${KONG_DB_PASSWORD:-kong_pass}
      - KONG_PG_DB=kong
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_LOG_LEVEL=info
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    volumes:
      - ./apps/api-gateway/config:/usr/local/kong/declarative:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network

  kong-database:
    image: docker.io/ postgres:16-alpine
    container_name: gradeloop-kong-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=kong
      - POSTGRES_PASSWORD=${KONG_DB_PASSWORD:-kong_pass}
      - POSTGRES_DB=kong
    ports:
      - "5433:5432"
    volumes:
      - kong-database-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network

  # =============================================================================
  # IAM Service (Go)
  # =============================================================================
  iam:
    build:
      context: ../../apps/services/iam
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./apps/services/iam:/app
    container_name: gradeloop-iam
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVER_PORT=${IAM_SVC_PORT:-8081}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${GRA_DB_USER:-postgres}
      - DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - DB_NAME=${IAM_SVC_DB_NAME:-iam_db}
      - DB_SSLMODE=${GRA_DB_SSLMODE:-disable}
      - EMAIL_SERVICE_URL=http://email:8082
      - MINIO_ENDPOINT=seaweed:9333
    expose:
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
      seaweed:
        condition: service_started
    networks:
      - gradeloop-network

  # =============================================================================
  # Academic Service (Go)
  # =============================================================================
  academic:
    build:
      context: ../../apps/services/academic
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./apps/services/academic:/app
    container_name: gradeloop-academic
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVER_PORT=${ACADEMIC_SVC_PORT:-8083}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${GRA_DB_USER:-postgres}
      - DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - DB_NAME=${ACADEMIC_SVC_DB_NAME:-academic_db}
      - IAM_SERVICE_URL=http://iam:8081
    expose:
      - "8083"
    depends_on:
      postgres:
        condition: service_healthy
      iam:
        condition: service_started
    networks:
      - gradeloop-network

  # =============================================================================
  # Assessment Service (Go)
  # =============================================================================
  assessment:
    build:
      context: ../../apps/services/assessment
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./apps/services/assessment:/app
    container_name: gradeloop-assessment
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVER_PORT=${ASSESSMENT_SVC_PORT:-8084}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${GRA_DB_USER:-postgres}
      - DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - DB_NAME=${ASSESSMENT_SVC_DB_NAME:-assessment_db}
      - ACADEMIC_SERVICE_URL=http://academic:8083
    expose:
      - "8084"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network

  # =============================================================================
  # Email Service (Go)
  # =============================================================================
  email:
    build:
      context: ../../apps/services/email
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./apps/services/email:/app
    container_name: gradeloop-email
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVER_PORT=${EMAIL_SVC_PORT:-8082}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${GRA_DB_USER:-postgres}
      - DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - DB_NAME=${EMAIL_SVC_DB_NAME:-email_db}
    expose:
      - "8082"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - gradeloop-network

  # =============================================================================
  # IVAS Service (Python)
  # =============================================================================
  ivas:
    build:
      context: ../../apps/services/ivas
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./apps/services/ivas:/app
    container_name: gradeloop-ivas
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVICE_PORT=${IVAS_SVC_PORT:-8101}
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@postgres:5432/${IVAS_SVC_DB_NAME:-ivas_db}
    expose:
      - "8101"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network

  # =============================================================================
  # ACAFS Service (Python)
  # =============================================================================
  acafs:
    build:
      context: ../../apps/services/acafs
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./apps/services/acafs:/app
    container_name: gradeloop-acafs
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVICE_PORT=${ACAFS_SVC_PORT:-8102}
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@postgres:5432/${ACAFS_SVC_DB_NAME:-acafs_db}
    expose:
      - "8102"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network

  # =============================================================================
  # Keystroke Service (Python)
  # =============================================================================
  keystroke:
    build:
      context: ../../apps/services/keystroke
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./apps/services/keystroke:/app
    container_name: gradeloop-keystroke
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=${KEYSTROKE_SVC_PORT:-8103}
      - DATABASE_URL=postgresql://keystroke_user:keystroke_pass@postgres-keystroke:5432/keystroke-db
    expose:
      - "8103"
    depends_on:
      postgres-keystroke:
        condition: service_healthy
    networks:
      - gradeloop-network

  # =============================================================================
  # CIPAS Syntactics Service (Python)
  # =============================================================================
  cipas-syntactics:
    build:
      context: ../../apps/services/cipas-syntactics
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./apps/services/cipas-syntactics:/app
    container_name: gradeloop-cipas-syntactics
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CIPAS_SYNTACTICS_PORT=${CIPAS_SYN_SVC_PORT:-8106}
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@postgres:5432/${CIPAS_SVC_DB_NAME:-cipas_db}
    expose:
      - "8106"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network

  # =============================================================================
  # CIPAS Semantics Service (Python)
  # =============================================================================
  cipas-semantics:
    build:
      context: ../../apps/services/cipas-semantics
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./apps/services/cipas-semantics:/app
    container_name: gradeloop-cipas-semantics
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - API_PORT=${CIPAS_SEM_SVC_PORT:-8105}
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@postgres:5432/${CIPAS_SVC_DB_NAME:-cipas_db}
    expose:
      - "8105"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network

  # =============================================================================
  # CIPAS XAI Service (Go)
  # =============================================================================
  cipas-xai:
    build:
      context: ../../apps/services/cipas-xai
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./apps/services/cipas-xai:/app
    container_name: gradeloop-cipas-xai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVER_PORT=${CIPAS_XAI_SVC_PORT:-8085}
    expose:
      - "8085"
    networks:
      - gradeloop-network

networks:
  gradeloop-network:
    driver: bridge

volumes:
  postgres-data:
  postgres-keystroke-data:
  rabbitmq-data:
  redis-data:
  seaweed-data:
  kong-database-data: