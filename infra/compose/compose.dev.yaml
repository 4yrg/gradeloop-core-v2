services:
  postgres:
    image: docker.io/postgres:16-alpine
    pull_policy: missing
    container_name: gradeloop-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${GRA_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - POSTGRES_DB=${IAM_SVC_DB_NAME:-iam_db}
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: pg_isready -U ${GRA_DB_USER:-postgres}
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
  postgres-keystroke:
    image: docker.io/postgres:16-alpine
    pull_policy: missing
    container_name: gradeloop-postgres-keystroke
    restart: unless-stopped
    environment:
      - POSTGRES_USER=keystroke_user
      - POSTGRES_PASSWORD=keystroke_pass
      - POSTGRES_DB=keystroke-db
    ports:
      - 5433:5432
    volumes:
      - postgres-keystroke-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: pg_isready -U keystroke_user -d keystroke-db
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
  rabbitmq:
    image: docker.io/rabbitmq:3.13-management-alpine
    pull_policy: missing
    container_name: gradeloop-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - gradeloop-network
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - ping
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
  redis:
    image: docker.io/redis:7-alpine
    pull_policy: missing
    container_name: gradeloop-redis
    restart: unless-stopped
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
    networks:
      - gradeloop-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    healthcheck:
      test:
        - CMD
        - redis-cli
        - --no-auth-warning
        - -a
        - ${REDIS_PASSWORD:-redis_pass}
        - incr
        - ping
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
  seaweed:
    image: docker.io/chrislusf/seaweedfs:3.71
    pull_policy: missing
    container_name: gradeloop-seaweed
    restart: unless-stopped
    environment:
      - WEEAD_IDENTITY=seaweedfs
    ports:
      - 9333:9333
      - 9320:9320
      - 9080:8080
      - 8333:8333
    volumes:
      - seaweed-data:/data
      - ./s3Config.json:/etc/seaweedfs/s3.json:ro
    networks:
      - gradeloop-network
    command: server -s3 -filer -s3.config=/etc/seaweedfs/s3.json
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:9333/cluster/status
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
      target: dev
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://178.105.102.246:8000/api/v1}
        - NEXT_PUBLIC_GATEWAY_URL=${NEXT_PUBLIC_GATEWAY_URL:-http://178.105.102.246:8000}
    container_name: gradeloop-web
    env_file:
      - ../../apps/web/.env
    restart: unless-stopped
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://178.105.102.246:8000/api/v1}
      - NEXT_PUBLIC_GATEWAY_URL=${NEXT_PUBLIC_GATEWAY_URL:-http://178.105.102.246:8000}
      - WATCHPACK_POLLING=true
    volumes:
      - ../../:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    ports:
      - 3000:3000
    networks:
      - gradeloop-network
  gateway:
    build:
      context: ../../apps/api-gateway
      dockerfile: Dockerfile
    container_name: gradeloop-gateway
    restart: unless-stopped
    ports:
      - 8000:8000
    volumes:
      - ../../apps/api-gateway/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    networks:
      - gradeloop-network
    depends_on:
      web:
        condition: service_started
      iam:
        condition: service_healthy
      academic:
        condition: service_healthy
      acafs:
        condition: service_healthy
      assessment:
        condition: service_healthy
      cipas-ai:
        condition: service_healthy
      cipas-semantics:
        condition: service_healthy
      cipas-syntactics:
        condition: service_healthy
      cipas-xai:
        condition: service_healthy
      email:
        condition: service_healthy
      notification:
        condition: service_started
      ivas:
        condition: service_healthy
      keystroke:
        condition: service_healthy
  iam:
    build:
      context: ../../
      dockerfile: apps/services/iam/Dockerfile
      target: dev
    container_name: gradeloop-iam
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - SERVER_PORT=${IAM_SVC_PORT:-8081}
      - GRA_DB_HOST=gradeloop-postgres
      - GRA_DB_PORT=5432
      - GRA_DB_USER=${GRA_DB_USER:-postgres}
      - GRA_DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - IAM_SVC_DB_NAME=${IAM_SVC_DB_NAME:-iam_db}
      - GRA_DB_SSLMODE=${GRA_DB_SSLMODE:-disable}
      - EMAIL_SERVICE_URL=http://gradeloop-email:8082
      - MINIO_ENDPOINT=gradeloop-seaweed:8333
      - MINIO_ACCESS_KEY=root
      - MINIO_SECRET_KEY=root
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-gradeloop_secret_key_change_me}
    ports:
      - 8081:8081
    depends_on:
      postgres:
        condition: service_healthy
      seaweed:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8081/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
  academic:
    build:
      context: ../../
      dockerfile: apps/services/academic/Dockerfile
      target: dev
    container_name: gradeloop-academic
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - SERVER_PORT=${ACADEMIC_SVC_PORT:-8083}
      - GRA_DB_HOST=gradeloop-postgres
      - GRA_DB_PORT=5432
      - GRA_DB_USER=${GRA_DB_USER:-postgres}
      - GRA_DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - ACADEMIC_SVC_DB_NAME=${ACADEMIC_SVC_DB_NAME:-academic_db}
      - IAM_SERVICE_URL=http://gradeloop-iam:8081
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-gradeloop_secret_key_change_me}
    ports:
      - 8083:8083
    depends_on:
      postgres:
        condition: service_healthy
      iam:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8083/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
  assessment:
    build:
      context: ../../
      dockerfile: apps/services/assessment/Dockerfile
      target: dev
    container_name: gradeloop-assessment
    restart: unless-stopped
    environment:
      - SERVER_PORT=${ASSESSMENT_SVC_PORT:-8084}
      - GRA_DB_HOST=gradeloop-postgres
      - GRA_DB_PORT=5432
      - GRA_DB_USER=${GRA_DB_USER:-postgres}
      - GRA_DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - ASSESSMENT_SVC_DB_NAME=${ASSESSMENT_SVC_DB_NAME:-assessment_db}
      - ACADEMIC_SERVICE_URL=http://gradeloop-academic:8083
      - MINIO_ENDPOINT=gradeloop-seaweed:8333
      - MINIO_ACCESS_KEY=root
      - MINIO_SECRET_KEY=root
      - RABBITMQ_URL=amqp://guest:guest@gradeloop-rabbitmq:5672/
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-gradeloop_secret_key_change_me}
    ports:
      - 8084:8084
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seaweed:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8084/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
  email:
    build:
      context: ../../
      dockerfile: apps/services/email/Dockerfile
      target: dev
    container_name: gradeloop-email
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - ../../.env.development
    environment:
      - SERVER_PORT=${EMAIL_SVC_PORT:-8082}
      - GRA_DB_HOST=gradeloop-postgres
      - GRA_DB_PORT=5432
      - GRA_DB_USER=${GRA_DB_USER:-postgres}
      - GRA_DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - EMAIL_SVC_DB_NAME=${EMAIL_SVC_DB_NAME:-email_db}
      - RABBITMQ_URL=amqp://guest:guest@gradeloop-rabbitmq:5672/
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-gradeloop_secret_key_change_me}
    ports:
      - 8082:8082
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8082/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
  ivas:
    build:
      context: ../../apps/services/ivas
      dockerfile: Dockerfile
    volumes:
      - ../../apps/services/ivas:/app
      - ../../packages/python:/packages/python
    container_name: gradeloop-ivas
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - SERVICE_PORT=${IVAS_SVC_PORT:-8101}
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@gradeloop-postgres:5432/${IVAS_SVC_DB_NAME:-ivas_db}
      - RABBITMQ_URL=amqp://guest:guest@gradeloop-rabbitmq:5672/
      - IAM_SERVICE_URL=http://gradeloop-iam:8081
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@gradeloop-redis:6379/1
      - PYTHONPATH=/app:/packages/python
    ports:
      - 8101:8101
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/api/v1/ivas/health').getcode() == 200 or exit(1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
  acafs:
    container_name: gradeloop-acafs
    build:
      context: ../../apps/services/acafs
      dockerfile: Dockerfile
    environment:
      - SERVICE_PORT=${ACAFS_SVC_PORT:-8102}
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@gradeloop-postgres:5432/${ACAFS_SVC_DB_NAME:-acafs_db}
      - RABBITMQ_URL=amqp://guest:guest@gradeloop-rabbitmq:5672/
      - MINIO_ENDPOINT=gradeloop-seaweed:8333
      - MINIO_ACCESS_KEY=root
      - MINIO_SECRET_KEY=root
      - PYTHONPATH=/app:/packages/python
    volumes:
      - ../../apps/services/acafs:/app
      - ../../packages/python:/packages/python
    ports:
      - 8102:8102
    depends_on:
      postgres:
        condition: service_healthy
      seaweed:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8102/api/v1/acafs/health').getcode() == 200 or exit(1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
  keystroke:
    container_name: gradeloop-keystroke
    build:
      context: ../../apps/services/keystroke
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      - PORT=${KEYSTROKE_SVC_PORT:-8103}
      - DATABASE_URL=postgresql://keystroke_user:keystroke_pass@gradeloop-postgres-keystroke:5432/keystroke-db
      - KEYSTROKE_REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@gradeloop-redis:6379
      - GEMINI_API_KEY=${KEYSTROKE_GEMINI_API_KEY:-}
      - PYTHONPATH=/app:/packages/python
    volumes:
      - ../../apps/services/keystroke:/app
      - ../../packages/python:/packages/python
    ports:
      - 8103:8103
    depends_on:
      postgres-keystroke:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8103/health').getcode() == 200 or exit(1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
  cipas-syntactics:
    container_name: gradeloop-cipas-syntactics
    build:
      context: ../../
      dockerfile: apps/services/cipas-syntactics/Dockerfile
    environment:
      - CIPAS_SYNTACTICS_PORT=${CIPAS_SYN_SVC_PORT:-8106}
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@gradeloop-postgres:5432/${CIPAS_SVC_DB_NAME:-cipas_db}
      - PYTHONPATH=/app:/packages/python
    volumes:
      - ../../apps/services/cipas-syntactics:/app
      - ../../packages/python:/packages/python
    ports:
      - 8106:8106
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import os; import urllib.request; port = os.getenv('CIPAS_SYNTACTICS_PORT', '8106'); exit(0 if urllib.request.urlopen(f'http://localhost:{port}/api/v1/syntactics/health').getcode() == 200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
  cipas-semantics:
    container_name: gradeloop-cipas-semantics
    build:
      context: ../../
      dockerfile: apps/services/cipas-semantics/Dockerfile
    environment:
      - API_PORT=${CIPAS_SEM_SVC_PORT:-8105}
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@gradeloop-postgres:5432/${CIPAS_SVC_DB_NAME:-cipas_db}
      - PYTHONPATH=/app:/packages/python
    volumes:
      - ../../apps/services/cipas-semantics:/app
      - ../../packages/python:/packages/python
    ports:
      - 8105:8105
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8105/api/v1/semantics/health').getcode() == 200 or exit(1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
  cipas-ai:
    container_name: gradeloop-cipas-ai
    build:
      context: ../../
      dockerfile: apps/services/cipas-ai/Dockerfile
    environment:
      - CIPAS_AI_PORT=${CIPAS_AI_SVC_PORT:-8104}
      - DATABASE_URL=postgresql://${GRA_DB_USER:-postgres}:${GRA_DB_PASSWORD:-postgres}@gradeloop-postgres:5432/${CIPAS_AI_SVC_DB_NAME:-cipas_ai_db}
      - PYTHONPATH=/app:/packages/python
    volumes:
      - ../../apps/services/cipas-ai:/app
      - ../../packages/python:/packages/python
    ports:
      - 8104:8104
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gradeloop-network
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8104/api/v1/ai/health').getcode() == 200 or exit(1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
  notification:
    build:
      context: ../../
      dockerfile: apps/services/notification/Dockerfile
      target: dev
    container_name: gradeloop-notification
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - SERVER_PORT=8086
      - GRA_DB_HOST=gradeloop-postgres
      - GRA_DB_PORT=5432
      - GRA_DB_USER=${GRA_DB_USER:-postgres}
      - GRA_DB_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - NOTIFICATION_SVC_DB_NAME=${NOTIFICATION_SVC_DB_NAME:-notification_db}
      - GRA_DB_SSLMODE=${GRA_DB_SSLMODE:-disable}
      - RABBITMQ_URL=amqp://guest:guest@gradeloop-rabbitmq:5672/
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@gradeloop-redis:6379/0
      - IAM_SERVICE_URL=http://gradeloop-iam:8081
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-gradeloop_secret_key_change_me}
    ports:
      - 8086:8086
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gradeloop-network
  cipas-xai:
    build:
      context: ../../
      dockerfile: apps/services/cipas-xai/Dockerfile
      target: dev
    container_name: gradeloop-cipas-xai
    restart: unless-stopped
    environment:
      - SERVER_PORT=${CIPAS_XAI_SVC_PORT:-8085}
      - LLM_API_KEY=${LLM_API_KEY:-placeholder_key_change_me}
    ports:
      - 8085:8085
    networks:
      - gradeloop-network
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8085/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
networks:
  gradeloop-network:
    driver: bridge
volumes:
  postgres-data:
    name: gradeloop-postgres-data
  postgres-keystroke-data:
    name: gradeloop-postgres-keystroke-data
  rabbitmq-data:
    name: gradeloop-rabbitmq-data
  redis-data:
    name: gradeloop-redis-data
  seaweed-data:
    name: gradeloop-seaweed-data
