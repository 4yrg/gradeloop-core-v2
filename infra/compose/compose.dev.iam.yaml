# =============================================================================
# GradeLoop Core v2 - Development Compose (IAM Extended)
# =============================================================================
# Includes Keycloak, Mock LTI, Mock SSO for full IAM development
#
# Usage:
#   docker compose -f compose.dev.yaml up -d
#   docker compose -f compose.dev.yaml logs -f keycloak
#   docker compose -f compose.dev.yaml down
#
# Services:
#   - PostgreSQL (main + Keycloak)
#   - Redis
#   - Keycloak (dev realm)
#   - IAM Service (Go)
#   - Mock LTI Tool Provider
#   - Mock SSO Provider

services:
  # =============================================================================
  # Infrastructure
  # =============================================================================
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: gradeloop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${GRA_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${GRA_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${IAM_SVC_DB_NAME:-iam_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: docker.io/postgres:16-alpine
    container_name: gradeloop-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    ports:
      - "5431:5432"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/redis:7-alpine
    container_name: gradeloop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gradeloop-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Keycloak (Identity Provider)
  # =============================================================================
  keycloak:
    image: docker.io/quay.io/keycloak/keycloak:24.0
    container_name: gradeloop-keycloak
    restart: unless-stopped
    command: start-dev --http-relative-path=/auth --hostname-strict=false --hostname=localhost
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: localhost
    ports:
      - "8080:8080"
    networks:
      - gradeloop-network
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =============================================================================
  # IAM Service (Go)
  # =============================================================================
  iam:
    build:
      context: ../../apps/services/iam
      dockerfile: Dockerfile
      target: dev
    container_name: gradeloop-iam
    restart: unless-stopped
    environment:
      - ENV=local
      - HOST=0.0.0.0
      - SERVER_PORT=8081
      
      # Database
      - GRA_DB_HOST=gradeloop-postgres
      - GRA_DB_PORT=5432
      - GRA_DB_USER=postgres
      - GRA_DB_PASSWORD=postgres
      - IAM_SVC_DB_NAME=iam_db
      - GRA_DB_SSLMODE=disable
      
      # Redis
      - REDIS_HOST=gradeloop-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis_pass
      
      # JWT / Keycloak
      - JWT_SECRET_KEY=gradeloop_dev_secret_key_12345
      - JWT_ACCESS_TOKEN_EXPIRY=15
      - JWT_REFRESH_TOKEN_EXPIRY=10080
      - KEYCLOAK_URL=http://localhost:8080/auth
      - KEYCLOAK_REALM=gradeloop-lms
      - KEYCLOAK_CLIENT_ID=lms-api
      - KEYCLOAK_JWKS_TTL=300
      - KEYCLOAK_DEFAULT_TENANT=dev-university
      - JWT_ISSUER=http://localhost:8080/auth/realms/gradeloop-lms
      
      # IAM Modes (DEVELOPMENT - PERMISSIVE)
      - AUTHZ_MODE=permissive
      - AUTHZ_AUDIT_ENABLED=false
      # SSO
      - SSO_MODE=mock
      - SSO_JIT_ENABLED=true
      - SSO_DEFAULT_ROLE=student
      - SSO_ALLOW_LOCAL=true
      # LTI (mock mode)
      - LTI_MODE=mock
      - LTI_PLATFORM_URL=http://localhost:8080
      - LTI_CLIENT_ID=dev-client
      - LTI_DEPLOYMENT_ID=dev-deployment
      - LTI_ISSUER=http://localhost:8080
      - LTI_NRPS_ENABLED=true
      - LTI_AGS_ENABLED=true
      - LTI_DEEP_LINKING_ENABLED=true
      - LTI_1_1_ENABLED=true
      - LTI_NONCE_TTL=300
      # Zero Trust (relaxed)
      - ZERO_TRUST_MODE=relaxed
      - ZERO_TRUST_ENABLED=false
      - DEVICE_TRUST_MODE=relaxed
      - DEVICE_FINGERPRINT_REQUIRED=false
      - MAX_SESSION_AGE_HOURS=24
      - SESSION_VALIDATION_INTERVAL_SEC=300
      - MTLS_ENABLED=false
      # Rate limiting
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_PER_MINUTE=100
      
      # Frontend
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "8081:8081"
    volumes:
      - ../../apps/services/iam:/app
    networks:
      - gradeloop-network
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =============================================================================
  # Mock LTI Tool Provider (simulates external LMS)
  # =============================================================================
  mock-lti-provider:
    image: docker.io/nginx:alpine
    container_name: gradeloop-mock-lti
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./mock-lti-html:/usr/share/nginx/html:ro
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # =============================================================================
  # Mock SSO Provider (for testing)
  # =============================================================================
  # Note: SSO mock is built into IAM service
  # Use IAM endpoints:
  #   GET /api/v1/auth/sso/mock/callback?email=student@dev.local

networks:
  gradeloop-network:
    driver: bridge

volumes:
  postgres-data:
  keycloak-db-data:
  redis-data:
