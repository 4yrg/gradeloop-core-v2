worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Increase proxy timeouts for long-running requests (e.g. AI services)
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    # WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Common proxy headers
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 8000;
        server_name _;

        # Docker embedded DNS — enables dynamic hostname resolution at request
        # time so nginx does not fail to start when upstream containers are
        # still initialising.
        resolver 127.0.0.11 valid=30s;

        # ── Upstream variables (resolved lazily per-request) ──────────────
        set $academic      http://gradeloop-academic:8083;
        set $acafs         http://gradeloop-acafs:8102;
        set $assessment    http://gradeloop-assessment:8084;
        set $cipas_ai      http://cipas-ai:8104;
        set $cipas_sem     http://cipas-semantics:8105;
        set $cipas_syn     http://cipas-syntactics:8106;
        set $cipas_xai     http://cipas-xai:8085;
        set $email         http://gradeloop-email:8082;
        set $notification  http://gradeloop-notification:8086;
        set $iam           http://gradeloop-iam:8081;
        set $ivas          http://ivas:8101;
        set $keystroke     http://keystroke:8103;

        # Strip upstream CORS headers so nginx's own headers are not duplicated
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        # Helper for CORS
        set $cors_origin "";
        if ($http_origin ~* (https?://localhost(:[0-9]+)?|https://gradeloop-core-v2-web\.vercel\.app|https://gradeloop-core-v2\.vercel\.app|https://api\.gradeloop\.space|https://app\.gradeloop\.space|https://gradeloop\.space)) {
            set $cors_origin $http_origin;
        }

        # Global CORS Handling
        add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, X-Request-ID, X-Requested-With, Cache-Control, Connection, X-HTTP-Method-Override' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Type, Cache-Control, Connection' always;
        add_header 'Access-Control-Max-Age' 3600 always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Academic Service
        location /api/v1/departments      { proxy_pass $academic; }
        location /api/v1/faculties        { proxy_pass $academic; }
        location /api/v1/degrees          { proxy_pass $academic; }
        location /api/v1/specializations  { proxy_pass $academic; }
        location /api/v1/batches          { proxy_pass $academic; }
        location /api/v1/batch-members    { proxy_pass $academic; }
        location /api/v1/course-instances  { proxy_pass $academic; }
        location /api/v1/course-instructors { proxy_pass $academic; }
        location /api/v1/enrollments      { proxy_pass $academic; }
        location /api/v1/courses          { proxy_pass $academic; }
        location /api/v1/semesters        { proxy_pass $academic; }
        location /api/v1/instructor-courses { proxy_pass $academic; }
        location /api/v1/student-courses  { proxy_pass $academic; }
        location /api/v1/debug            { proxy_pass $academic; }
        location /docs/academic/ {
            rewrite ^/docs/academic/(.*) /$1 break;
            proxy_pass $academic;
        }

        # ACAFS Service
        location /api/v1/acafs { proxy_pass $acafs; }
        location /docs/acafs/ {
            rewrite ^/docs/acafs/(.*) /$1 break;
            proxy_pass $acafs;
        }

        # Assessment Service
        location /api/v1/assignments         { proxy_pass $assessment; }
        location /api/v1/submissions         { proxy_pass $assessment; }
        location /api/v1/groups              { proxy_pass $assessment; }
        location /api/v1/instructor-assignments  { proxy_pass $assessment; }
        location /api/v1/instructor-submissions  { proxy_pass $assessment; }
        location /api/v1/student-assignments  { proxy_pass $assessment; }
        location /api/v1/student-submissions  { proxy_pass $assessment; }
        location /api/v1/github              { proxy_pass $assessment; }
        location /api/v1/code                { proxy_pass $assessment; }
        location /docs/assessment/ {
            rewrite ^/docs/assessment/(.*) /$1 break;
            proxy_pass $assessment;
        }

        # CIPAS AI
        location /api/v1/ai { proxy_pass $cipas_ai; }
        location /docs/cipas-ai/ {
            rewrite ^/docs/cipas-ai/(.*) /$1 break;
            proxy_pass $cipas_ai;
        }

        # CIPAS Semantics
        location /api/v1/semantics { proxy_pass $cipas_sem; }
        location /docs/cipas-semantics/ {
            rewrite ^/docs/cipas-semantics/(.*) /$1 break;
            proxy_pass $cipas_sem;
        }

        # CIPAS Syntactics
        location /api/v1/syntactics { proxy_pass $cipas_syn; }
        location /docs/cipas-syntactics/ {
            rewrite ^/docs/cipas-syntactics/(.*) /$1 break;
            proxy_pass $cipas_syn;
        }

        # CIPAS XAI
        location /api/v1/xai { proxy_pass $cipas_xai; }
        location /docs/cipas-xai/ {
            rewrite ^/docs/cipas-xai/(.*) /$1 break;
            proxy_pass $cipas_xai;
        }

        # Email Service
        location /api/v1/emails { proxy_pass $email; }
        location /docs/email/ {
            rewrite ^/docs/email/(.*) /$1 break;
            proxy_pass $email;
        }

        # Notification Service
        location /api/v1/notifications {
            proxy_pass $notification;
        }
        location /api/v1/notifications/stream {
            proxy_pass $notification;
            # Re-declare all proxy headers (location-level proxy_set_header
            # overrides every parent-level proxy_set_header directive).
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Empty Connection header keeps the upstream connection alive
            # instead of inheriting the client's "close" or upgrade header.
            proxy_set_header Connection        '';
            # SSE requires streaming — never buffer or chunk-limit the response.
            proxy_buffering            off;
            proxy_cache                off;
            proxy_read_timeout         86400s;
            proxy_send_timeout         86400s;
            # Let Nginx use chunked transfer encoding so it can forward the
            # open-ended stream without needing a Content-Length upfront.
            chunked_transfer_encoding  on;
        }

        # IAM Service
        location /api/v1/auth   { proxy_pass $iam; }
        location /api/v1/users  { proxy_pass $iam; }
        location /api/v1/admin  { proxy_pass $iam; }
        location /api/v1/tokens { proxy_pass $iam; }
        location /docs/iam/ {
            rewrite ^/docs/iam/(.*) /$1 break;
            proxy_pass $iam;
        }

        # IVAS Service
        location /api/v1/ivas { proxy_pass $ivas; }
        location /ws/ivas {
            proxy_pass $ivas;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /docs/ivas/ {
            rewrite ^/docs/ivas/(.*) /$1 break;
            proxy_pass $ivas;
        }

        # Keystroke Service
        location /api/keystroke { proxy_pass $keystroke; }
        location /ws/monitor {
            proxy_pass $keystroke;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /docs/keystroke/ {
            rewrite ^/docs/keystroke/(.*) /$1 break;
            proxy_pass $keystroke;
        }
    }

    # HTTPS server — requires SSL certificates mounted at /etc/nginx/ssl/
    # Uncomment for production deployment with valid certs.
    # server {
    #     listen 8443 ssl;
    #     server_name api.gradeloop.space;
    #     ssl_certificate     /etc/nginx/ssl/kong.crt;
    #     ssl_certificate_key /etc/nginx/ssl/kong.key;
    #     # ... (mirror HTTP server block above) ...
    # }
}
