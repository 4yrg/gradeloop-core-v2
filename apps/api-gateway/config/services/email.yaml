# =============================================================================
# Email Service - Kong Configuration
# Handles email notifications
# =============================================================================
_format_version: "3.0"

services:
  - name: email-service
    url: http://email-service:8082
    routes:
      - name: email-routes
        paths:
          - /api/v1/emails
        strip_path: false
        preserve_host: false
      - name: email-docs
        paths:
          - /docs/email
        strip_path: true
        preserve_host: false
    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:3000
            - http://localhost:80
            - http://localhost:8080
            - http://localhost:443
            - http://localhost:8101
            - http://localhost:8102
            - http://localhost:8103
            - http://localhost:8104
            - http://localhost:8105
            - http://localhost:8106
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          headers:
            - Origin
            - Content-Type
            - Accept
            - Authorization
            - X-Request-ID
            - X-Requested-With
          credentials: true
          max_age: 3600
      - name: jwt-validation
        run_on_first_request: false
      - name: rate-limiting
        config:
          minute: 1000
          policy: local
          fault_tolerant: true
          hide_client_headers: false