# =============================================================================
# IVAS Service - Kong Configuration
# Intelligent Viva Assessment System
# =============================================================================
_format_version: "3.0"

services:
  - name: ivas-service
    url: http://ivas-service:8101
    read_timeout: 300000
    write_timeout: 300000
    connect_timeout: 300000
    routes:
      - name: ivas-api
        paths:
          - /api/v1/ivas
        strip_path: false
        preserve_host: false
      - name: ivas-websocket
        paths:
          - /ws/ivas
        strip_path: false
        preserve_host: false
      - name: ivas-docs
        paths:
          - /docs/ivas
        strip_path: true
        preserve_host: false
    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:3000
            - http://localhost:3001
            - http://localhost:80
            - http://localhost:8080
            - http://localhost:443
            - https://gradeloop-core-v2-web.vercel.app
            - https://gradeloop-core-v2.vercel.app
            - https://api.gradeloop.space
            - https://app.gradeloop.space
            - https://gradeloop.space
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          headers:
            - Origin
            - Content-Type
            - Accept
            - Authorization
            - X-Request-ID
            - X-Requested-With
          credentials: true
          max_age: 3600
      - name: jwt-validation
        run_on_first_request: false
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          fault_tolerant: true
          hide_client_headers: false