# =============================================================================
# IVAS Service - Kong Configuration
# Intelligent Viva Assessment System
# =============================================================================
_format_version: "3.0"

services:
  - name: ivas-service
    url: http://ivas-service:8088
    routes:
      - name: ivas-api
        paths:
          - /api/v1/ivas
        strip_path: false
        preserve_host: false
      - name: ivas-websocket
        paths:
          - /ws/ivas
        strip_path: false
        preserve_host: false
    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:3000
            - http://localhost:3001
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          headers:
            - Origin
            - Content-Type
            - Accept
            - Authorization
            - X-Request-ID
          credentials: true
          max_age: 3600
      - name: jwt-validation
        run_on_first_request: false
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          fault_tolerant: true
          hide_client_headers: false