# =============================================================================
# IAM Service - Kong Configuration
# Handles authentication, users, and admin APIs
# =============================================================================
_format_version: "3.0"

services:
  - name: iam-service
    url: http://kong-service:8081
    routes:
      - name: iam-auth
        paths:
          - /api/v1/auth
        strip_path: false
        preserve_host: false
      - name: iam-users
        paths:
          - /api/v1/users
        strip_path: false
        preserve_host: false
      - name: iam-admin
        paths:
          - /api/v1/admin
        strip_path: false
        preserve_host: false
      - name: iam-tokens
        paths:
          - /api/v1/tokens
        strip_path: false
        preserve_host: false
      - name: iam-docs
        paths:
          - /docs/iam
        strip_path: true
        preserve_host: false
    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:3000
            - http://localhost:80
            - http://localhost:8080
            - http://localhost:443
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          headers:
            - Origin
            - Content-Type
            - Accept
            - Authorization
            - X-Request-ID
            - X-Requested-With
            - X-HTTP-Method-Override
          credentials: true
          max_age: 3600
      - name: jwt-validation
        run_on_first_request: false
      - name: rate-limiting
        config:
          minute: 1000
          policy: local
          fault_tolerant: true
          hide_client_headers: false

  - name: iam-login
    url: http://iam-service:8081
    routes:
      - name: iam-login-route
        paths:
          - /api/v1/auth/login
        strip_path: false
        preserve_host: false
    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:3000
            - http://localhost:80
            - http://localhost:8080
            - http://localhost:443
          methods:
            - GET
            - POST
            - OPTIONS
          headers:
            - Origin
            - Content-Type
            - Accept
            - Authorization
          credentials: true
      - name: rate-limiting
        config:
          minute: 20
          policy: local
          fault_tolerant: true
          hide_client_headers: false