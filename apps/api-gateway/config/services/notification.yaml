# =============================================================================
# Notification Service - Kong Configuration
# Handles notifications and SSE streaming
# =============================================================================
_format_version: "3.0"

services:
  - name: notification-service
    url: http://notification-service:8086
    routes:
      - name: notifications-api
        paths:
          - /api/v1/notifications
        strip_path: false
        preserve_host: false
      - name: notifications-stream
        paths:
          - /api/v1/notifications/stream
        strip_path: false
        preserve_host: false
      - name: notification-docs
        paths:
          - /docs/notification
        strip_path: true
        preserve_host: false
    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:3000
            - http://localhost:80
            - http://localhost:8080
            - http://localhost:443
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          headers:
            - Origin
            - Content-Type
            - Accept
            - Authorization
            - X-Request-ID
            - X-Requested-With
            - Cache-Control
            - Connection
          exposed_headers:
            - Content-Type
            - Cache-Control
            - Connection
          credentials: true
          max_age: 3600
      - name: jwt-validation
        run_on_first_request: false
      - name: rate-limiting
        config:
          minute: 1000
          policy: local
          fault_tolerant: true
          hide_client_headers: false
