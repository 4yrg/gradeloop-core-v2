worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;
        server_name _;

        client_max_body_size 200m;

        # Helper for CORS - reflect origin to allow all while supporting credentials
        set $cors_origin $http_origin;

        add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, X-Request-ID, X-Requested-With, Cache-Control, Connection, X-HTTP-Method-Override' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Type, Cache-Control, Connection' always;
        add_header 'Access-Control-Max-Age' 3600 always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        location /api/v1/departments { proxy_pass http://gradeloop-academic:8083; }
        location /api/v1/faculties { proxy_pass http://gradeloop-academic:8083; }
        location /api/v1/degrees { proxy_pass http://gradeloop-academic:8083; }
        location /api/v1/specializations { proxy_pass http://gradeloop-academic:8083; }
        location /api/v1/batches { proxy_pass http://gradeloop-academic:8083; }
        location /api/v1/batch-members { proxy_pass http://gradeloop-academic:8083; }
        location /api/v1/course-instances { proxy_pass http://gradeloop-academic:8083; }
        location /api/v1/course-instructors { proxy_pass http://gradeloop-academic:8083; }
        location /api/v1/enrollments { proxy_pass http://gradeloop-academic:8083; }
        location /api/v1/courses { proxy_pass http://gradeloop-academic:8083; }
        location /api/v1/semesters { proxy_pass http://gradeloop-academic:8083; }
        location /api/v1/instructor-courses { proxy_pass http://gradeloop-academic:8083; }
        location /api/v1/student-courses { proxy_pass http://gradeloop-academic:8083; }
        location /api/v1/debug { proxy_pass http://gradeloop-academic:8083; }
        location /docs/academic/ {
            rewrite ^/docs/academic/(.*) /$1 break;
            proxy_pass http://gradeloop-academic:8083;
        }

        location /api/v1/acafs { proxy_pass http://gradeloop-acafs:8102; }
        location /docs/acafs/ {
            rewrite ^/docs/acafs/(.*) /$1 break;
            proxy_pass http://gradeloop-acafs:8102;
        }

        location /api/v1/assignments { proxy_pass http://gradeloop-assessment:8084; }
        location /api/v1/submissions { proxy_pass http://gradeloop-assessment:8084; }
        location /api/v1/groups { proxy_pass http://gradeloop-assessment:8084; }
        location /api/v1/instructor-assignments { proxy_pass http://gradeloop-assessment:8084; }
        location /api/v1/instructor-submissions { proxy_pass http://gradeloop-assessment:8084; }
        location /api/v1/student-assignments { proxy_pass http://gradeloop-assessment:8084; }
        location /api/v1/student-submissions { proxy_pass http://gradeloop-assessment:8084; }
        location /api/v1/github { proxy_pass http://gradeloop-assessment:8084; }
        location /api/v1/code { proxy_pass http://gradeloop-assessment:8084; }
        location /docs/assessment/ {
            rewrite ^/docs/assessment/(.*) /$1 break;
            proxy_pass http://gradeloop-assessment:8084;
        }

        location /api/v1/ai { proxy_pass http://cipas-ai:8104; }
        location /docs/cipas-ai/ {
            rewrite ^/docs/cipas-ai/(.*) /$1 break;
            proxy_pass http://cipas-ai:8104;
        }

        location /api/v1/semantics { proxy_pass http://cipas-semantics:8105; }
        location /docs/cipas-semantics/ {
            rewrite ^/docs/cipas-semantics/(.*) /$1 break;
            proxy_pass http://cipas-semantics:8105;
        }

        location /api/v1/syntactics { proxy_pass http://cipas-syntactics:8106; }
        location /docs/cipas-syntactics/ {
            rewrite ^/docs/cipas-syntactics/(.*) /$1 break;
            proxy_pass http://cipas-syntactics:8106;
        }

        location /api/v1/xai { proxy_pass http://cipas-xai:8085; }
        location /docs/cipas-xai/ {
            rewrite ^/docs/cipas-xai/(.*) /$1 break;
            proxy_pass http://cipas-xai:8085;
        }

        location /api/v1/emails { proxy_pass http://gradeloop-email:8082; }
        location /docs/email/ {
            rewrite ^/docs/email/(.*) /$1 break;
            proxy_pass http://gradeloop-email:8082;
        }

        location /api/v1/notifications { proxy_pass http://gradeloop-notification:8086; }
        location /api/v1/notifications/stream {
            proxy_pass http://gradeloop-notification:8086;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }

        location /api/v1/auth { proxy_pass http://gradeloop-iam:8081; }
        location /api/v1/users { proxy_pass http://gradeloop-iam:8081; }
        location /api/v1/admin { proxy_pass http://gradeloop-iam:8081; }
        location /api/v1/tokens { proxy_pass http://gradeloop-iam:8081; }
        location /docs/iam/ {
            rewrite ^/docs/iam/(.*) /$1 break;
            proxy_pass http://gradeloop-iam:8081;
        }

        location /api/v1/ivas { proxy_pass http://ivas:8101; }
        location /ws/ivas {
            proxy_pass http://ivas:8101;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /docs/ivas/ {
            rewrite ^/docs/ivas/(.*) /$1 break;
            proxy_pass http://ivas:8101;
        }

        location /api/keystroke { proxy_pass http://keystroke:8103; }
        location /ws/monitor {
            proxy_pass http://keystroke:8103;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /docs/keystroke/ {
            rewrite ^/docs/keystroke/(.*) /$1 break;
            proxy_pass http://keystroke:8103;
        }

        location / {
            proxy_pass http://gradeloop-web:3000;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
