[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gradeloop-notifier"
version = "0.1.0"
description = "GradeLoop notification publisher — send notifications via RabbitMQ"
requires-python = ">=3.11"
dependencies = [
    "pika>=1.3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.8.0",
]

[tool.setuptools.packages.find]
include = ["gradeloop_notifier*"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]