# =============================================================================
# GradeLoop Core v2 - Infrastructure Compose
# =============================================================================
# This file contains INFRASTRUCTURE SERVICES ONLY
#
# Usage:
#   docker compose up -d                    # Start all infrastructure
#   docker compose up -d postgres          # Start only postgres
#   docker compose --profile infra up -d   # Start infrastructure profile
#
# For local development:
#   1. docker compose up -d                # Start infrastructure
#   2. make dev SERVICE=<name>           # Run services locally
#
# For full stack in Docker:
#   docker compose -f compose.dev.yaml up -d
#
# For production:
#   docker compose -f compose.prod.yaml up -d

x-shared-environment: &shared_env
  GRA_DB_USER: ${GRA_DB_USER:-postgres}
  GRA_DB_PASSWORD: ${GRA_DB_PASSWORD:-postgres}
  GRA_DB_HOST: ${GRA_DB_HOST:-localhost}
  GRA_DB_PORT: ${GRA_DB_PORT:-5432}
  GRA_DB_SSLMODE: ${GRA_DB_SSLMODE:-disable}

services:
  # =============================================================================
  # PostgreSQL (Main Database)
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: gradeloop-postgres
    restart: unless-stopped
    profiles:
      - infra
      - all
    environment:
      - POSTGRES_USER=${GRA_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${GRA_DB_PASSWORD:-postgres}
      - POSTGRES_DB=${IAM_SVC_DB_NAME:-iam_db}
      - POSTGRES_INITDB_ARGS=${GRA_DB_INITDB_ARGS:--E UTF-8}
    ports:
      - "${GRA_DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GRA_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # PostgreSQL — Keystroke Service (Dedicated Instance)
  # =============================================================================
  postgres-keystroke:
    image: postgres:16-alpine
    container_name: gradeloop-postgres-keystroke
    restart: unless-stopped
    profiles:
      - infra
      - all
    environment:
      - POSTGRES_USER=keystroke_user
      - POSTGRES_PASSWORD=keystroke_pass
      - POSTGRES_DB=keystroke-db
    ports:
      - "5433:5432"
    volumes:
      - postgres-keystroke-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keystroke_user -d keystroke-db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # RabbitMQ (Message Queue)
  # =============================================================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: gradeloop-rabbitmq
    restart: unless-stopped
    profiles:
      - infra
      - all
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # Redis (Cache/Sessions)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: gradeloop-redis
    restart: unless-stopped
    profiles:
      - infra
      - all
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gradeloop-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # MinIO (Object Storage)
  # =============================================================================
  minio:
    image: minio/minio:latest
    container_name: gradeloop-minio
    restart: unless-stopped
    profiles:
      - infra
      - all
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - gradeloop-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # Kong Database (Separate PostgreSQL for Kong Gateway)
  # =============================================================================
  kong-database:
    image: postgres:16-alpine
    container_name: gradeloop-kong-db
    restart: unless-stopped
    profiles:
      - infra
      - all
    environment:
      - POSTGRES_USER=kong
      - POSTGRES_PASSWORD=${KONG_DB_PASSWORD:-kong_pass}
      - POSTGRES_DB=kong
    ports:
      - "5433:5432"
    volumes:
      - kong-database-data:/var/lib/postgresql/data
    networks:
      - gradeloop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d kong"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

networks:
  gradeloop-network:
    driver: bridge

volumes:
  postgres-data:
    name: gradeloop-postgres-data
  postgres-keystroke-data:
    name: gradeloop-postgres-keystroke-data
  rabbitmq-data:
    name: gradeloop-rabbitmq-data
  redis-data:
    name: gradeloop-redis-data
  minio-data:
    name: gradeloop-minio-data
  kong-database-data:
    name: gradeloop-kong-db-data